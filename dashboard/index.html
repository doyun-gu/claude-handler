<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --bg-card: #222;
  --bg-hover: #2a2a2a;
  --border: #333;
  --text: #ccc;
  --text-dim: #888;
  --text-bright: #eee;
  --green: #5a5;
  --red: #a55;
  --blue: #68a;
  --yellow: #aa6;
  --orange: #a85;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", monospace;
  font-size: 13px;
  line-height: 1.5;
  padding: 0;
}

/* ── Header ─────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: #161616;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 12px;
}
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
.live-dot.dead { background: var(--red); }

/* ── Section ────────────────────────────── */
.section {
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
}
.section-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.section-header .toggle {
  font-size: 11px;
  color: var(--text-dim);
}

/* ── System bar ─────────────────────────── */
.sys-bar {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  font-size: 13px;
}
.sys-bar .val { color: var(--text-bright); }

/* ── Services bar ───────────────────────── */
.svc-bar {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 13px;
}
.svc-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  margin-left: 4px;
  vertical-align: middle;
}
.svc-dot.up { background: var(--green); }
.svc-dot.down { background: var(--red); }

/* ── Tables ─────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 6px 8px;
  border-bottom: 1px solid #2a2a2a;
  vertical-align: top;
}
tr:hover td { background: var(--bg-hover); }
tr.running td { border-left: 3px solid var(--blue); }
tr.queued td { color: var(--text-dim); }

/* ── Status badges ──────────────────────── */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
}
.badge-running { background: #1a3a4a; color: #7bc; }
.badge-completed { background: #1a3a1a; color: #7b7; }
.badge-failed { background: #3a1a1a; color: #b77; }
.badge-blocked { background: #3a2a1a; color: #ba7; }
.badge-queued { background: #2a2a2a; color: #888; }
.badge-merged { background: #1a2a3a; color: #79b; }
.badge-cancelled { background: #2a2a2a; color: #666; }
.badge-decision_needed { background: #2a2a1a; color: #aa8; }

/* ── Summary Card ──────────────────────── */
.summary-card {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  padding: 8px 0;
  font-size: 13px;
}
.summary-stat {
  color: var(--text-dim);
}
.summary-stat .val {
  color: var(--text-bright);
  font-weight: 600;
}
.summary-stat .label { margin-left: 4px; }

/* ── Filter Buttons ────────────────────── */
.filter-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
}
.filter-btn {
  display: inline-block;
  padding: 2px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { background: var(--bg-hover); color: var(--text); }
.filter-btn.active {
  background: #1a2a3a;
  border-color: var(--blue);
  color: var(--blue);
}

/* ── Project Group ─────────────────────── */
.project-group {
  margin-bottom: 8px;
}
.project-group-name {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 0 2px 0;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 2px;
}

/* ── Buttons ────────────────────────────── */
.btn {
  display: inline-block;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-hover); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-merge { border-color: #3a5a3a; color: #7b7; }
.btn-merge:hover { background: #1a3a1a; }
.btn-dismiss { border-color: #3a3a3a; color: #999; }
.btn-dismiss:hover { background: #2a2a2a; }
.btn-fix { border-color: #3a3a1a; color: #ba7; }
.btn-fix:hover { background: #2a2a1a; }
.btn-review { border-color: #1a3a5a; color: #68a; }
.btn-review:hover { background: #1a2a3a; }
.btn-reject { border-color: #5a3a3a; color: #a55; }
.btn-reject:hover { background: #3a1a1a; }

/* ── Decision Panel ────────────────────── */
.review-card {
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-card);
  padding: 12px 16px;
  margin-bottom: 8px;
}
.review-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.review-card-title {
  font-size: 13px;
  color: var(--text-bright);
  font-weight: 600;
}
.review-card-project {
  font-size: 11px;
  color: var(--text-dim);
}
.review-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.6;
}
.review-meta .label { color: var(--text-dim); }
.review-meta .val { color: var(--text); }
.review-recommendation {
  background: #1a2a1a;
  border: 1px solid #2a3a2a;
  border-radius: 3px;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
}
.review-recommendation .rec-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--green);
  margin-bottom: 4px;
}
.review-diff-stat {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.review-diff-stat .additions { color: var(--green); }
.review-diff-stat .deletions { color: var(--red); }
.review-diff-stat .files-list {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  max-height: 60px;
  overflow-y: auto;
}
.review-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.review-preview-url {
  font-size: 11px;
  margin-bottom: 8px;
}
.review-preview-url a {
  color: var(--blue);
  text-decoration: none;
}
.review-preview-url a:hover { text-decoration: underline; }

/* ── Reject Modal ──────────────────────── */
.reject-input-wrap {
  display: none;
  margin-top: 8px;
}
.reject-input-wrap.open { display: flex; gap: 6px; align-items: flex-start; }
.reject-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 6px 8px;
  resize: vertical;
  min-height: 32px;
}

/* ── Toast ──────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  animation: fadeIn 0.2s;
  max-width: 360px;
}
.toast-ok { background: #1a3a1a; color: #7b7; border: 1px solid #3a5a3a; }
.toast-err { background: #3a1a1a; color: #b77; border: 1px solid #5a3a3a; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

/* ── Collapsible ────────────────────────── */
.collapsed .section-body { display: none; }

/* ── Empty state ────────────────────────── */
.empty { color: var(--text-dim); font-style: italic; padding: 8px 0; }

/* ── Responsive ─────────────────────────── */
@media (max-width: 768px) {
  .sys-bar, .svc-bar { gap: 12px; }
  table { font-size: 11px; }
  td, th { padding: 4px 4px; }
  .section { padding: 8px 12px; }
  .header { padding: 10px 12px; }
  .header h1 { font-size: 12px; }
  .hide-mobile { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Fleet Monitor</h1>
  <div class="header-right">
    <span id="updated">--</span>
    <span class="live-dot" id="live-dot"></span>
  </div>
</div>

<!-- System -->
<div class="section" id="sys-section">
  <div class="sys-bar" id="sys-bar">
    <span>CPU: <span class="val" id="sys-cpu">--</span></span>
    <span>RAM: <span class="val" id="sys-ram">--</span></span>
    <span>Disk: <span class="val" id="sys-disk">--</span></span>
    <span>Uptime: <span class="val" id="sys-uptime">--</span></span>
  </div>
</div>

<!-- Services -->
<div class="section" id="svc-section">
  <div class="svc-bar" id="svc-bar">--</div>
</div>

<!-- Active Tasks -->
<div class="section" id="active-section">
  <div class="section-label">Active Tasks</div>
  <div id="active-body"></div>
</div>

<!-- Completed (summary + collapsible list) -->
<div class="section collapsed" id="completed-section">
  <div class="section-header" onclick="toggleSection('completed-section')">
    <span class="section-label" style="margin-bottom:0">Completed <span id="completed-count"></span></span>
    <span class="toggle" id="completed-toggle">[show]</span>
  </div>
  <div id="completed-summary" style="margin-top:6px"></div>
  <div class="section-body" id="completed-body" style="margin-top:6px"></div>
</div>

<!-- Action Required -->
<div class="section" id="review-section" style="display:none">
  <div class="section-label">Action Required</div>
  <div id="review-body"></div>
</div>

<!-- Backlog -->
<div class="section" id="backlog-section">
  <div class="section-header" onclick="toggleSection('backlog-section')">
    <span class="section-label" style="margin-bottom:0">Backlog <span id="backlog-count"></span></span>
    <span class="toggle" id="backlog-toggle">[hide]</span>
  </div>
  <div class="section-body" id="backlog-body" style="margin-top:6px"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const REFRESH = 10000;
let lastFetch = 0;
let completedPeriod = 'today';

// ── Helpers ─────────────────────────────────

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function duration(start, end) {
  if (!start) return '--';
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  const sec = Math.floor((e - s) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function badge(status) {
  const cls = 'badge-' + (status || 'queued');
  return '<span class="badge ' + cls + '">' + esc(status || 'unknown') + '</span>';
}

function shortBranch(b) {
  if (!b) return '--';
  return b.length > 30 ? b.slice(0, 28) + '..' : b;
}

function shortSlug(id) {
  if (!id) return '--';
  const m = id.match(/^\d{8}-\d{6}-(.+)$/);
  return m ? m[1] : id;
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function toggleSection(id) {
  const sec = document.getElementById(id);
  sec.classList.toggle('collapsed');
  const toggle = sec.querySelector('.toggle');
  if (toggle) toggle.textContent = sec.classList.contains('collapsed') ? '[show]' : '[hide]';
}

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Actions ─────────────────────────────────

async function doMerge(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'merging...';
  try {
    const res = await apiPost('/api/action', { type: 'merge', task_slug: slug });
    if (res.status === 'ok') {
      toast('Merged: ' + (res.message || slug), true);
      const card = btn.closest('.review-card');
      if (card) card.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Merge failed: ' + (res.message || 'unknown error'), false);
      btn.disabled = false;
      btn.textContent = 'Approve & Merge';
    }
  } catch (e) {
    toast('Merge error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Approve & Merge';
  }
}

async function doDismiss(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dismissing...';
  try {
    const res = await apiPost('/api/action', { type: 'skip', task_slug: slug });
    if (res.status === 'ok') {
      toast('Dismissed: ' + shortSlug(slug), true);
      const card = btn.closest('.review-card');
      if (card) card.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Dismiss failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Dismiss';
    }
  } catch (e) {
    toast('Dismiss error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Dismiss';
  }
}

async function doAutofix(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dispatching...';
  try {
    const res = await apiPost('/api/action', { type: 'fix', task_slug: slug });
    if (res.status === 'ok') {
      toast('Fix dispatched: ' + shortSlug(slug), true);
      const card = btn.closest('.review-card');
      if (card) card.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Fix failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Auto-fix';
    }
  } catch (e) {
    toast('Fix error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Auto-fix';
  }
}

function toggleRejectInput(cardId) {
  const wrap = document.getElementById('reject-' + cardId);
  if (wrap) wrap.classList.toggle('open');
}

async function doReject(slug, cardId) {
  const textarea = document.querySelector('#reject-' + cardId + ' textarea');
  const feedback = textarea ? textarea.value.trim() : '';
  if (!feedback) {
    toast('Please provide feedback for the rejection', false);
    return;
  }
  const btn = document.querySelector('#reject-' + cardId + ' .btn-merge');
  if (btn) { btn.disabled = true; btn.textContent = 'sending...'; }
  try {
    const res = await apiPost('/api/action', {
      type: 'fix',
      task_slug: slug,
      description: 'Revision requested: ' + feedback,
    });
    if (res.status === 'ok') {
      toast('Revision dispatched: ' + shortSlug(slug), true);
      const card = document.getElementById('card-' + cardId);
      if (card) card.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Reject failed: ' + (res.message || ''), false);
      if (btn) { btn.disabled = false; btn.textContent = 'Send'; }
    }
  } catch (e) {
    toast('Reject error: ' + e.message, false);
    if (btn) { btn.disabled = false; btn.textContent = 'Send'; }
  }
}

function setCompletedPeriod(period) {
  completedPeriod = period;
  // Update filter button active states
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.period === period);
  });
  refresh();
}

// ── Renderers ───────────────────────────────

function renderSystem(data) {
  document.getElementById('sys-cpu').textContent = data.cpu_percent + '%';
  document.getElementById('sys-ram').textContent = data.ram_used_gb + '/' + data.ram_total_gb + ' GB';
  document.getElementById('sys-disk').textContent = (data.disk_free_gb || '--') + ' GB free';
  document.getElementById('sys-uptime').textContent = data.uptime || '--';
}

function renderServices(svcs) {
  const bar = document.getElementById('svc-bar');
  bar.innerHTML = svcs.map(function(s) {
    const up = s.status === 'up';
    const label = s.port ? s.name + ':' + s.port : s.name;
    return '<span>' + esc(label) + ' <span class="svc-dot ' + (up ? 'up' : 'down') + '"></span></span>';
  }).join('');
}

function renderActiveTasks(tasks) {
  const active = tasks.filter(function(t) { return t.status === 'running' || t.status === 'queued'; });
  const el = document.getElementById('active-body');

  if (active.length === 0) {
    el.innerHTML = '<div class="empty">No active tasks</div>';
    return;
  }

  let html = '<table><tr><th>Task</th><th>Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Branch</th></tr>';
  for (let i = 0; i < active.length; i++) {
    const t = active[i];
    const cls = t.status === 'running' ? 'running' : 'queued';
    html += '<tr class="' + cls + '">';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + esc(shortBranch(t.branch)) + '</td>';
    html += '</tr>';
  }
  html += '</table>';
  el.innerHTML = html;
}

function renderCompletedSummary(summary) {
  const el = document.getElementById('completed-summary');
  let html = '<div class="summary-card">';
  html += '<span class="summary-stat"><span class="val">' + summary.today_count + '</span><span class="label">completed today</span></span>';
  html += '<span class="summary-stat"><span class="val">' + summary.merged_count + '</span><span class="label">PRs merged</span></span>';
  html += '<span class="summary-stat"><span class="val">' + summary.projects_touched + '</span><span class="label">projects</span></span>';
  html += '<span class="summary-stat"><span class="val">' + esc(summary.total_duration) + '</span><span class="label">total time</span></span>';
  html += '</div>';
  el.innerHTML = html;
}

function renderCompleted(tasks) {
  const done = tasks.filter(function(t) {
    return t.status === 'completed' || t.status === 'merged' || t.status === 'failed';
  });

  document.getElementById('completed-count').textContent = '(' + done.length + ')';

  const el = document.getElementById('completed-body');
  if (done.length === 0) {
    el.innerHTML = '<div class="empty">No completed tasks</div>';
    return;
  }

  // Filter bar
  let html = '<div class="filter-bar">';
  html += '<button class="filter-btn' + (completedPeriod === 'today' ? ' active' : '') + '" data-period="today" onclick="setCompletedPeriod(\'today\')">Today</button>';
  html += '<button class="filter-btn' + (completedPeriod === '7d' ? ' active' : '') + '" data-period="7d" onclick="setCompletedPeriod(\'7d\')">7 Days</button>';
  html += '<button class="filter-btn' + (completedPeriod === 'all' ? ' active' : '') + '" data-period="all" onclick="setCompletedPeriod(\'all\')">All</button>';
  html += '</div>';

  // Group by project
  const groups = {};
  for (let i = 0; i < done.length; i++) {
    const t = done[i];
    const proj = t.project_name || 'unknown';
    if (!groups[proj]) groups[proj] = [];
    groups[proj].push(t);
  }

  const projectNames = Object.keys(groups).sort();
  for (let p = 0; p < projectNames.length; p++) {
    const proj = projectNames[p];
    const items = groups[proj];
    html += '<div class="project-group">';
    html += '<div class="project-group-name">' + esc(proj) + ' (' + items.length + ')</div>';
    html += '<table><tr><th>Task</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Finished</th></tr>';
    for (let i = 0; i < items.length; i++) {
      const t = items[i];
      html += '<tr>';
      html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
      html += '<td>' + badge(t.status) + '</td>';
      html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
      html += '<td class="hide-mobile">' + timeAgo(t.finished_at || t.merged_at) + '</td>';
      html += '</tr>';
    }
    html += '</table>';
    html += '</div>';
  }

  el.innerHTML = html;
}

function renderReview(items) {
  const sec = document.getElementById('review-section');
  const el = document.getElementById('review-body');

  if (items.length === 0) {
    sec.style.display = 'none';
    return;
  }
  sec.style.display = '';

  let html = '';
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const meta = item.meta || {};
    const taskId = meta.task_id || '';
    const slug = shortSlug(taskId);
    const project = meta.project || '--';
    const itemType = meta.type || 'unknown';
    const reason = item.reason || '';
    const safeId = taskId.replace(/'/g, "\\'");
    const cardId = 'c' + i;
    const recommendation = item.recommendation || '';
    const previewUrl = item.preview_url || '';
    const prUrl = item.pr_url || '';
    const diffStat = item.diff_stat || null;

    html += '<div class="review-card" id="card-' + cardId + '">';

    // Header: slug + project + type badge
    html += '<div class="review-card-header">';
    html += '<span class="review-card-title">' + esc(slug) + '</span>';
    html += '<span>' + badge(itemType) + ' <span class="review-card-project">' + esc(project) + '</span></span>';
    html += '</div>';

    // Reason / description
    html += '<div class="review-meta"><span class="val">' + esc(reason) + '</span></div>';

    // Body content (the markdown from the review item)
    if (item.body) {
      html += '<div class="review-meta">' + esc(item.body).substring(0, 300) + '</div>';
    }

    // Worker recommendation
    if (recommendation) {
      html += '<div class="review-recommendation">';
      html += '<div class="rec-label">Worker Recommendation</div>';
      html += esc(recommendation);
      html += '</div>';
    }

    // Diff stat / impact assessment
    if (diffStat) {
      html += '<div class="review-diff-stat">';
      html += '<span class="val">' + diffStat.files_changed + '</span> files changed';
      html += ' &middot; <span class="additions">+' + diffStat.additions + '</span>';
      html += ' <span class="deletions">-' + diffStat.deletions + '</span>';
      if (diffStat.changed_files && diffStat.changed_files.length > 0) {
        html += '<div class="files-list">';
        for (let f = 0; f < diffStat.changed_files.length; f++) {
          html += esc(diffStat.changed_files[f]) + '<br>';
        }
        html += '</div>';
      }
      html += '</div>';
    }

    // Preview URL (for UI changes)
    if (previewUrl) {
      html += '<div class="review-preview-url">Preview: <a href="' + esc(previewUrl) + '" target="_blank">' + esc(previewUrl) + '</a></div>';
    }

    // Action buttons
    html += '<div class="review-actions">';
    if (itemType === 'completed') {
      html += '<button class="btn btn-merge" onclick="doMerge(\'' + safeId + '\', this)">Approve & Merge</button>';
      if (previewUrl) {
        html += '<a class="btn btn-review" href="' + esc(previewUrl) + '" target="_blank">Review in Browser</a>';
      } else if (prUrl) {
        html += '<a class="btn btn-review" href="' + esc(prUrl) + '" target="_blank">View PR</a>';
      }
      html += '<button class="btn btn-reject" onclick="toggleRejectInput(\'' + cardId + '\')">Reject & Explain</button>';
      html += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else if (itemType === 'failed' || itemType === 'blocked') {
      html += '<button class="btn btn-fix" onclick="doAutofix(\'' + safeId + '\', this)">Auto-fix</button>';
      html += '<button class="btn btn-reject" onclick="toggleRejectInput(\'' + cardId + '\')">Reject & Explain</button>';
      html += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else if (itemType === 'decision_needed') {
      html += '<button class="btn btn-merge" onclick="doMerge(\'' + safeId + '\', this)">Approve & Merge</button>';
      html += '<button class="btn btn-reject" onclick="toggleRejectInput(\'' + cardId + '\')">Reject & Explain</button>';
      html += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else {
      html += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    }
    html += '</div>';

    // Reject input (hidden by default)
    html += '<div class="reject-input-wrap" id="reject-' + cardId + '">';
    html += '<textarea class="reject-input" placeholder="Explain what needs to change..."></textarea>';
    html += '<button class="btn btn-merge" onclick="doReject(\'' + safeId + '\', \'' + cardId + '\')">Send</button>';
    html += '</div>';

    html += '</div>'; // close review-card
  }

  el.innerHTML = html;
}

function renderBacklog(tasks) {
  document.getElementById('backlog-count').textContent = '(' + tasks.length + ')';

  const el = document.getElementById('backlog-body');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty">No backlog items</div>';
    return;
  }

  let html = '<table><tr><th>Pri</th><th>Task</th><th>Project</th><th class="hide-mobile">Est.</th><th class="hide-mobile">Category</th></tr>';
  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    html += '<tr>';
    html += '<td>' + (t.priority != null ? t.priority : '--') + '</td>';
    html += '<td>' + esc(t.slug || t.id || '--') + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td class="hide-mobile">' + (t.estimated_minutes ? t.estimated_minutes + 'm' : '--') + '</td>';
    html += '<td class="hide-mobile">' + esc(t.category || '--') + '</td>';
    html += '</tr>';
  }
  html += '</table>';
  el.innerHTML = html;
}

function updateTimestamp() {
  const ago = Math.floor((Date.now() - lastFetch) / 1000);
  document.getElementById('updated').textContent = ago + 's ago';
}

// ── Main refresh ────────────────────────────

async function refresh() {
  try {
    const [sys, svcs, tasks, review, backlog, summary] = await Promise.all([
      api('/api/system'),
      api('/api/services'),
      api('/api/tasks?period=' + completedPeriod),
      api('/api/review'),
      api('/api/backlog'),
      api('/api/tasks/summary'),
    ]);

    lastFetch = Date.now();
    document.getElementById('live-dot').className = 'live-dot';

    renderSystem(sys);
    renderServices(svcs);
    renderActiveTasks(tasks);
    renderCompletedSummary(summary);
    renderCompleted(tasks);
    renderReview(review);
    renderBacklog(backlog);
  } catch (e) {
    document.getElementById('live-dot').className = 'live-dot dead';
    console.error('Refresh failed:', e);
  }
}

// ── Init ────────────────────────────────────

refresh();
setInterval(refresh, REFRESH);
setInterval(updateTimestamp, 1000);
</script>
</body>
</html>
