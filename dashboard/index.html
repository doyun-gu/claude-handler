<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --bg-card: #222;
  --bg-hover: #2a2a2a;
  --border: #333;
  --text: #ccc;
  --text-dim: #888;
  --text-bright: #eee;
  --green: #5a5;
  --red: #a55;
  --blue: #68a;
  --yellow: #aa6;
  --orange: #a85;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", monospace;
  font-size: 13px;
  line-height: 1.5;
  padding: 0;
  padding-bottom: 60px;
}

/* ── Header ─────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: #161616;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 12px;
}
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
.live-dot.dead { background: var(--red); }

/* ── Section ────────────────────────────── */
.section {
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
}
.section-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.section-header .toggle {
  font-size: 11px;
  color: var(--text-dim);
}

/* ── Machine card ──────────────────────── */
.machine-card {
  padding: 10px 20px;
  border-left: 3px solid var(--green);
  background: var(--bg-card);
  border-radius: 0 4px 4px 0;
}
.machine-card.unhealthy { border-left-color: var(--red); }
.machine-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 13px;
}
.machine-row + .machine-row { margin-top: 4px; }
.machine-name {
  font-weight: 600;
  color: var(--text-bright);
  display: flex;
  align-items: center;
  gap: 6px;
}
.machine-name .online-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  flex-shrink: 0;
}
.machine-name .online-dot.offline { background: var(--text-dim); }
.machine-chip { color: var(--text-dim); }
.machine-stat { white-space: nowrap; }
.machine-stat .val { color: var(--text-bright); }
.machine-stat .sub { color: var(--text-dim); font-size: 12px; }
.role-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
  background: #1a3a4a;
  color: #7bc;
}
.role-badge.commander { background: #2a2a1a; color: #aa8; }
.commander-line {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid #2a2a2a;
}
.commander-line .online-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  display: inline-block;
}

/* ── Services bar ───────────────────────── */
.svc-bar {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 13px;
}
.svc-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  margin-left: 4px;
  vertical-align: middle;
}
.svc-dot.up { background: var(--green); }
.svc-dot.down { background: var(--red); }

/* ── Tables ─────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 6px 8px;
  border-bottom: 1px solid #2a2a2a;
  vertical-align: top;
}
tr:hover td { background: var(--bg-hover); }
tr.running td { border-left: 3px solid var(--blue); }
tr.queued td { color: var(--text-dim); }

/* ── Status badges ──────────────────────── */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
}
.badge-running { background: #1a3a4a; color: #7bc; }
.badge-completed { background: #1a3a1a; color: #7b7; }
.badge-failed { background: #3a1a1a; color: #b77; }
.badge-blocked { background: #3a2a1a; color: #ba7; }
.badge-queued { background: #2a2a2a; color: #888; }
.badge-merged { background: #1a2a3a; color: #79b; }
.badge-cancelled { background: #2a2a2a; color: #666; }
.badge-decision_needed { background: #2a2a1a; color: #aa8; }

/* ── Buttons ────────────────────────────── */
.btn {
  display: inline-block;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-hover); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-merge { border-color: #3a5a3a; color: #7b7; }
.btn-merge:hover { background: #1a3a1a; }
.btn-dismiss { border-color: #3a3a3a; color: #999; }
.btn-dismiss:hover { background: #2a2a2a; }
.btn-fix { border-color: #3a3a1a; color: #ba7; }
.btn-fix:hover { background: #2a2a1a; }

/* ── Toast ──────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 70px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  animation: fadeIn 0.2s;
  max-width: 360px;
}
.toast-ok { background: #1a3a1a; color: #7b7; border: 1px solid #3a5a3a; }
.toast-err { background: #3a1a1a; color: #b77; border: 1px solid #5a3a3a; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

/* ── Events bar ─────────────────────────── */
.events-bar {
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.events-bar .events-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.event-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 12px;
  white-space: nowrap;
}
.event-chip.status-upcoming { background: #2a2a2a; color: #888; }
.event-chip.status-imminent { background: #3a3a1a; color: #dd9; border: 1px solid #554; }
.event-chip.status-active { background: #3a1a1a; color: #e88; border: 1px solid #644; }
.event-chip.status-past { background: #1a1a1a; color: #555; text-decoration: line-through; }
.event-all-clear {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 3px;
  background: #1a3a1a;
  color: #7b7;
  font-size: 12px;
}
.event-freeze-note {
  font-size: 11px;
  color: var(--orange);
  margin-left: 4px;
}
.btn-add-event {
  margin-left: auto;
  padding: 2px 8px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
}
.btn-add-event:hover { background: var(--bg-hover); color: var(--text); }

/* ── Event modal ───────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
  width: 420px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 14px;
  color: var(--text-bright);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input[type="text"],
.modal input[type="date"],
.modal input[type="time"],
.modal textarea {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
}
.modal textarea { resize: vertical; min-height: 40px; }
.modal .row { display: flex; gap: 12px; }
.modal .row > div { flex: 1; }
.modal .checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.modal .checkbox-group label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  text-transform: none;
  font-size: 12px;
  color: var(--text);
  margin: 0;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}

/* ── Collapsible ────────────────────────── */
.collapsed .section-body { display: none; }

/* ── Filter pills ──────────────────────── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  font-size: 12px;
}
.filter-bar .filter-sep {
  width: 1px;
  height: 16px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}
.filter-pill {
  display: inline-block;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.filter-pill:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.filter-pill.active {
  background: #2a3a2a;
  color: var(--text-bright);
  border-color: #4a5a4a;
}

/* ── Empty state ────────────────────────── */
.empty { color: var(--text-dim); font-style: italic; padding: 8px 0; }

/* ── Command bar ───────────────────────── */
.command-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #161616;
  border-top: 1px solid var(--border);
  padding: 0;
  z-index: 400;
}
.command-bar-messages {
  max-height: 120px;
  overflow-y: auto;
  padding: 6px 20px 0;
  border-bottom: 1px solid #2a2a2a;
}
.command-bar-messages:empty { display: none; border: none; padding: 0; }
.cmd-msg {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  font-size: 11px;
  color: var(--text-dim);
}
.cmd-msg .cmd-text { flex: 1; color: var(--text); }
.cmd-msg .cmd-type {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 2px;
  background: #2a2a2a;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cmd-msg .cmd-type.dispatch { background: #1a3a4a; color: #7bc; }
.cmd-msg .cmd-type.fix { background: #3a3a1a; color: #ba7; }
.cmd-msg .cmd-type.note { background: #2a2a3a; color: #99b; }
.cmd-msg .cmd-status {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 2px;
}
.cmd-msg .cmd-status.pending { color: var(--yellow); }
.cmd-msg .cmd-status.read { color: var(--blue); }
.cmd-msg .cmd-status.done { color: var(--green); }
.command-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
}
.command-input-row input {
  flex: 1;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.command-input-row input:focus { border-color: #555; }
.command-input-row input::placeholder { color: #555; }
.cmd-send-btn {
  padding: 8px 16px;
  background: #2a3a2a;
  border: 1px solid #3a5a3a;
  border-radius: 4px;
  color: #7b7;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.cmd-send-btn:hover { background: #1a3a1a; }
.cmd-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Pipeline view ─────────────────────── */
.view-toggle {
  display: inline-flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-left: 12px;
}
.view-toggle-btn {
  padding: 2px 10px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.view-toggle-btn:last-child { border-right: none; }
.view-toggle-btn:hover { background: var(--bg-hover); color: var(--text); }
.view-toggle-btn.active { background: #2a3a2a; color: var(--text-bright); }

.pipeline-container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding: 8px 0 12px;
}
.pipeline-container.single-worker { justify-content: center; }

.pipeline-column {
  flex: 1;
  min-width: 240px;
  max-width: 400px;
}
.pipeline-header {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

.pipeline-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  position: relative;
  transition: border-color 0.3s, background 0.3s;
}
.pipeline-card.running {
  border-left: 3px solid var(--blue);
  animation: taskPulse 3s ease-in-out infinite;
}
.pipeline-card.queued {
  border-left: 3px solid #444;
  opacity: 0.7;
}
.pipeline-card.just-completed {
  border-left: 3px solid var(--green);
  animation: completeFlash 1.5s ease-out;
}

@keyframes taskPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.85; }
}
@keyframes completeFlash {
  0% { background: #1a3a1a; border-color: var(--green); }
  100% { background: var(--bg-card); border-color: var(--border); }
}

.pipeline-task-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-bright);
  margin-bottom: 4px;
}
.pipeline-task-meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.progress-bar-container {
  height: 4px;
  background: #2a2a2a;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s linear, background 0.5s;
}
.progress-bar-fill.normal { background: var(--blue); }
.progress-bar-fill.amber { background: var(--orange); }
.progress-bar-fill.red { background: var(--red); }

.pipeline-queue-connector {
  margin-left: 16px;
  padding-left: 12px;
  border-left: 2px dashed #444;
  position: relative;
}
.pipeline-queue-connector::before {
  content: '';
  position: absolute;
  left: -5px;
  top: 0;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #444;
}

.pipeline-empty {
  color: var(--text-dim);
  font-style: italic;
  text-align: center;
  padding: 24px 0;
  font-size: 13px;
}

/* ── Responsive ─────────────────────────── */
@media (max-width: 768px) {
  /* 9/10. Prevent horizontal overflow */
  html, body { overflow-x: hidden; max-width: 100vw; }

  /* 5. Font — min 13px body, monospace headers can be 11px */
  body { font-size: 13px; }
  table { font-size: 13px; }
  th { font-size: 11px; }

  /* Section padding */
  .section { padding: 8px 12px; }
  .header { padding: 10px 12px; }
  .header h1 { font-size: 13px; }

  /* Hide columns on mobile */
  .hide-mobile { display: none; }

  /* 1. Machine card — stack vertically on mobile */
  .machine-card { padding: 8px 12px; }
  .machine-row {
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
  }
  .commander-line {
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
  }

  /* 2. Services/quick links — wrap to 2 per row */
  .svc-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }

  /* 3. Tables — horizontal scroll wrapper fallback */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -12px;
    padding: 0 12px;
  }
  td, th { padding: 6px 6px; }

  /* 4. Buttons — 44px tap target (Apple HIG) */
  .btn {
    min-height: 44px;
    min-width: 44px;
    padding: 8px 14px;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Events/toast — full width, text wraps */
  .toast-container {
    left: 12px;
    right: 12px;
    bottom: 12px;
  }
  .toast { max-width: none; }

  /* 7. Review queue — card layout on mobile */
  #review-body table,
  #review-body thead,
  #review-body tbody,
  #review-body th,
  #review-body tr,
  #review-body td {
    display: block;
  }
  #review-body thead { display: none; }
  #review-body table { border: none; }
  #review-body tr {
    margin-bottom: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
  }
  #review-body tr:hover td { background: transparent; }
  #review-body td {
    padding: 2px 0;
    border: none;
  }
  #review-body td.hide-mobile { display: none; }
  #review-body td::before {
    content: attr(data-label);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 8px;
  }
  #review-body td.review-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  #review-body td.review-actions::before { display: none; }
  #review-body td.review-actions .btn { flex: 1; }

  /* 8. Completed — task name + status badge only on mobile */
  .hide-mobile-completed { display: none; }

  /* 10. Filter pills — wrap, 44px tap targets */
  .filter-bar { gap: 4px; }
  .filter-pill {
    min-height: 36px;
    padding: 6px 10px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
  }

  /* 11. Command bar — full width, comfortable input */
  .command-input-row { padding: 8px 12px; }
  .command-input-row input { font-size: 16px; padding: 10px 12px; }
  .cmd-send-btn { min-height: 44px; min-width: 44px; padding: 10px 14px; font-size: 13px; }
  .command-bar-messages { padding: 6px 12px 0; }

  /* 12. Pipeline — stack vertically on mobile */
  .pipeline-container { flex-direction: column; }
  .pipeline-column { max-width: none; min-width: 0; }

  /* 13. Body padding for command bar */
  body { padding-bottom: 70px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Fleet Monitor</h1>
  <div class="header-right">
    <span id="updated">--</span>
    <span class="live-dot" id="live-dot"></span>
  </div>
</div>

<!-- System / Machine Identity -->
<div class="section" id="sys-section">
  <div class="machine-card" id="machine-card">
    <div class="machine-row" id="machine-row-1">
      <span class="machine-name">
        <span class="online-dot" id="machine-dot"></span>
        <span id="machine-name">--</span>
      </span>
      <span class="machine-chip" id="machine-chip"></span>
      <span class="machine-stat">CPU: <span class="val" id="sys-cpu">--</span></span>

    <button class="cmd-send-btn" id="cmd-send" onclick="sendMessage()">Send</button>
  </div>

<div class="toast-container" id="toasts"></div>

<script>
const REFRESH = 10000;
const AVG_TASK_DURATION = 600; // 10 min in seconds
let lastFetch = 0;
let currentTimeFilter = 'today';
let currentProjectFilter = 'all';
let currentActiveView = 'pipeline';
let allTasks = [];
let recentMessages = [];

// ── Helpers ─────────────────────────────────

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function duration(start, end) {
  if (!start) return '--';
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  const sec = Math.floor((e - s) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function badge(status) {
  const cls = 'badge-' + (status || 'queued');
  return '<span class="badge ' + cls + '">' + esc(status || 'unknown') + '</span>';
}

function shortBranch(b) {
  if (!b) return '--';
  return b.length > 30 ? b.slice(0, 28) + '..' : b;
}

function shortSlug(id) {
  if (!id) return '--';
  const m = id.match(/^\d{8}-\d{6}-(.+)$/);
  return m ? m[1] : id;
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function toggleSection(id) {
  const sec = document.getElementById(id);
  sec.classList.toggle('collapsed');
  const toggle = sec.querySelector('.toggle');
  if (toggle) toggle.textContent = sec.classList.contains('collapsed') ? '[show]' : '[hide]';
}

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

async function apiPatch(path, body) {
  const r = await fetch(path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Actions ─────────────────────────────────

async function doMerge(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'merging...';
  try {
    const res = await apiPost('/api/action', { type: 'merge', task_slug: slug });
    if (res.status === 'ok') {
      toast('Merged: ' + (res.message || slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Merge failed: ' + (res.message || 'unknown error'), false);
      btn.disabled = false;
      btn.textContent = 'Merge';
    }
  } catch (e) {
    toast('Merge error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Merge';
  }
}

async function doDismiss(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dismissing...';
  try {
    const res = await apiPost('/api/action', { type: 'skip', task_slug: slug });
    if (res.status === 'ok') {
      toast('Dismissed: ' + shortSlug(slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Dismiss failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Dismiss';
    }
  } catch (e) {
    toast('Dismiss error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Dismiss';
  }
}

async function doAutofix(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dispatching...';
  try {
    const res = await apiPost('/api/action', { type: 'fix', task_slug: slug });
    if (res.status === 'ok') {
      toast('Fix dispatched: ' + shortSlug(slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Fix failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Auto-fix';
    }
  } catch (e) {
    toast('Fix error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Auto-fix';
  }
}

// ── Filters ─────────────────────────────────

function getProjectCounts(tasks) {
  const counts = {};
  for (let i = 0; i < tasks.length; i++) {
    const p = tasks[i].project_name || 'unknown';
    counts[p] = (counts[p] || 0) + 1;
  }
  return counts;
}

function timeCutoff(filter) {
  if (filter === 'all') return 0;
  if (filter === '7days') return Date.now() - 7 * 24 * 3600 * 1000;
  // 'today' — start of today
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
}

function filterTasks(tasks, statuses) {
  const cutoff = timeCutoff(currentTimeFilter);
  return tasks.filter(function(t) {
    if (statuses && statuses.indexOf(t.status) === -1) return false;
    if (currentProjectFilter !== 'all' && (t.project_name || 'unknown') !== currentProjectFilter) return false;
    if (cutoff > 0) {
      const ts = t.finished_at || t.merged_at || t.started_at || t.created_at;
      if (!ts || new Date(ts).getTime() < cutoff) return false;
    }
    return true;
  });
}

function setTimeFilter(val) {
  currentTimeFilter = val;
  rerender();
}

function setProjectFilter(val) {
  currentProjectFilter = val;
  rerender();
}

function renderFilterBar(containerId, tasks) {
  let el = document.getElementById(containerId);
  if (!el) return;

  const projectCounts = getProjectCounts(tasks);
  const projects = Object.keys(projectCounts).sort();

  let html = '';
  // Time pills
  html += '<span class="filter-pill' + (currentTimeFilter === 'today' ? ' active' : '') + '" onclick="setTimeFilter(\'today\')">Today</span>';
  html += '<span class="filter-pill' + (currentTimeFilter === '7days' ? ' active' : '') + '" onclick="setTimeFilter(\'7days\')">7 Days</span>';
  html += '<span class="filter-pill' + (currentTimeFilter === 'all' ? ' active' : '') + '" onclick="setTimeFilter(\'all\')">All</span>';

  // Separator
  html += '<span class="filter-sep"></span>';

  // Project pills
  html += '<span class="filter-pill' + (currentProjectFilter === 'all' ? ' active' : '') + '" onclick="setProjectFilter(\'all\')">All Projects</span>';
  for (let i = 0; i < projects.length; i++) {
    const p = projects[i];
    const isActive = currentProjectFilter === p ? ' active' : '';
    html += '<span class="filter-pill' + isActive + '" onclick="setProjectFilter(\'' + esc(p).replace(/'/g, "\\'") + '\')">' + esc(p) + ' (' + projectCounts[p] + ')</span>';
  }

  el.innerHTML = html;
}

function setActiveView(view) {
  currentActiveView = view;
  var btns = document.querySelectorAll('#view-toggle .view-toggle-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].textContent.toLowerCase() === view);
  }
  renderActiveTasks(allTasks);
}

function rerender() {
  renderFilterBar('active-filters', allTasks);
  renderFilterBar('completed-filters', allTasks);
  renderActiveTasks(allTasks);
  renderCompleted(allTasks);
}

// ── Renderers ───────────────────────────────

function renderSystem(data) {
  // Row 1: Machine name + chip + main metrics
  document.getElementById('sys-cpu').textContent = data.cpu_percent + '%';
  document.getElementById('sys-ram').textContent = data.ram_used_gb + '/' + data.ram_total_gb + ' GB';
  document.getElementById('sys-disk').textContent = (data.disk_free_gb || '--') + ' GB free';
  document.getElementById('sys-uptime').textContent = data.uptime || '--';

  // Machine identity
  var name = data.machine_name || 'unknown';
  // Prettify common hostnames
  if (name.toLowerCase().indexOf('mac-mini') >= 0 || name.toLowerCase().indexOf('macmini') >= 0) {
    name = 'Mac mini';
  } else if (name.toLowerCase().indexOf('macbook') >= 0) {
    name = 'MacBook Pro';
  }
  document.getElementById('machine-name').textContent = name;

  var chip = data.chip || '';
  document.getElementById('machine-chip').textContent = chip;

  // Row 2: Role + OS + core count + usage percentages
  var roleEl = document.getElementById('machine-role');
  var role = data.role || 'unknown';
  roleEl.textContent = role.charAt(0).toUpperCase() + role.slice(1);
  roleEl.className = 'role-badge' + (role === 'commander' ? ' commander' : '');

  document.getElementById('machine-os').textContent = data.os_version || '';
  document.getElementById('machine-cores').textContent = data.core_count || '--';
  document.getElementById('sys-ram-pct').textContent = (data.ram_percent || '--') + '%';
  document.getElementById('sys-disk-pct').textContent = (data.disk_percent || '--') + '%';

  // Commander last seen
  var cmdLine = document.getElementById('commander-line');
  if (data.commander_last_seen) {
    cmdLine.style.display = '';
    document.getElementById('commander-last-seen').textContent = 'Last seen: ' + data.commander_last_seen;
  } else {
    cmdLine.style.display = 'none';
  }

  // Health: card border color (green if online, check services later)
  var card = document.getElementById('machine-card');
  card.className = 'machine-card';  // reset to healthy
}

function renderServices(svcs) {
  const bar = document.getElementById('svc-bar');
  let anyDown = false;
  bar.innerHTML = svcs.map(function(s) {
    const up = s.status === 'up';
    if (!up) anyDown = true;
    const label = s.port ? s.name + ':' + s.port : s.name;
    return '<span>' + esc(label) + ' <span class="svc-dot ' + (up ? 'up' : 'down') + '"></span></span>';
  }).join('');
  // Update machine card health
  var card = document.getElementById('machine-card');
  if (anyDown) {
    card.classList.add('unhealthy');
  } else {
    card.classList.remove('unhealthy');
  }
}

function getTaskProgress(task) {
  if (!task.started_at || task.status !== 'running') return 0;
  var elapsed = (Date.now() - new Date(task.started_at).getTime()) / 1000;
  return Math.min(elapsed / AVG_TASK_DURATION, 1);
}

function getProgressClass(progress) {
  if (progress >= 1) return 'red';       // > 2x avg (100% and still going)
  if (progress >= 0.8) return 'amber';   // approaching avg
  return 'normal';
}

function renderPipelineView(active) {
  var el = document.getElementById('active-body');

  if (active.length === 0) {
    el.innerHTML = '<div class="pipeline-empty">All workers idle</div>';
    return;
  }

  // Group by project
  var groups = {};
  for (var i = 0; i < active.length; i++) {
    var t = active[i];
    var proj = t.project_name || 'unknown';
    if (!groups[proj]) groups[proj] = { running: [], queued: [] };
    if (t.status === 'running') groups[proj].running.push(t);
    else groups[proj].queued.push(t);
  }

  var projectNames = Object.keys(groups).sort();
  var singleWorker = projectNames.length === 1;

  var html = '<div class="pipeline-container' + (singleWorker ? ' single-worker' : '') + '">';

  for (var p = 0; p < projectNames.length; p++) {
    var proj = projectNames[p];
    var group = groups[proj];

    html += '<div class="pipeline-column">';
    html += '<div class="pipeline-header">' + esc(proj) + '</div>';

    // Running tasks
    for (var r = 0; r < group.running.length; r++) {
      var task = group.running[r];
      var progress = getTaskProgress(task);
      var pctWidth = Math.max(5, Math.round(progress * 100));
      var progressCls = getProgressClass(progress);
      var dur = duration(task.started_at, null);
      var pctLabel = '~' + Math.round(progress * 100) + '%';

      html += '<div class="pipeline-card running">';
      html += '<div class="pipeline-task-name">' + esc(shortSlug(task.id || task.slug)) + '</div>';
      html += '<div class="pipeline-task-meta">';
      html += badge('running');
      html += '<span>' + dur + '</span>';
      html += '<span>' + pctLabel + '</span>';
      html += '</div>';
      html += '<div class="progress-bar-container">';
      html += '<div class="progress-bar-fill ' + progressCls + '" style="width:' + pctWidth + '%"></div>';
      html += '</div>';
      html += '</div>';
    }

    // Queued tasks with connector
    if (group.queued.length > 0) {
      html += '<div class="pipeline-queue-connector">';
      for (var q = 0; q < group.queued.length; q++) {
        var qt = group.queued[q];
        html += '<div class="pipeline-card queued">';
        html += '<div class="pipeline-task-name">' + esc(shortSlug(qt.id || qt.slug)) + '</div>';
        html += '<div class="pipeline-task-meta">' + badge('queued') + '</div>';
        html += '</div>';
      }
      html += '</div>';
    } else if (group.running.length > 0) {
      html += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;margin-left:16px">No queue</div>';
    }

    html += '</div>'; // pipeline-column
  }

  html += '</div>'; // pipeline-container
  el.innerHTML = html;
}

function renderTableView(active) {
  var el = document.getElementById('active-body');

  if (active.length === 0) {
    el.innerHTML = '<div class="empty">No active tasks</div>';
    return;
  }

  var html = '<table><thead><tr><th>Task</th><th>Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Branch</th></tr></thead><tbody>';
  for (var i = 0; i < active.length; i++) {
    var t = active[i];
    var cls = t.status === 'running' ? 'running' : 'queued';
    html += '<tr class="' + cls + '">';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + esc(shortBranch(t.branch)) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderActiveTasks(tasks) {
  var all = tasks.filter(function(t) { return t.status === 'running' || t.status === 'queued'; });
  var active = all.filter(function(t) {
    return currentProjectFilter === 'all' || (t.project_name || 'unknown') === currentProjectFilter;
  });

  if (currentActiveView === 'pipeline') {
    renderPipelineView(active);
  } else {
    renderTableView(active);
  }
}

function renderCompleted(tasks) {
  const cutoff = timeCutoff(currentTimeFilter);
  const completedStatuses = ['completed', 'merged', 'failed'];
  const recent = tasks.filter(function(t) {
    if (completedStatuses.indexOf(t.status) === -1) return false;
    const fin = t.finished_at || t.merged_at;
    if (!fin) return false;
    if (cutoff > 0 && new Date(fin).getTime() < cutoff) return false;
    if (currentProjectFilter !== 'all' && (t.project_name || 'unknown') !== currentProjectFilter) return false;
    return true;
  });

  document.getElementById('completed-count').textContent = '(' + recent.length + ')';

  const el = document.getElementById('completed-table');
  if (!el) return;
  if (recent.length === 0) {
    const label = currentTimeFilter === 'today' ? 'today' : currentTimeFilter === '7days' ? 'last 7 days' : 'history';
    el.innerHTML = '<div class="empty">No completed tasks in ' + label + '</div>';
    return;
  }

  let html = '<table><thead><tr><th>Task</th><th class="hide-mobile-completed">Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Finished</th></tr></thead><tbody>';
  for (let i = 0; i < recent.length; i++) {
    const t = recent[i];
    html += '<tr>';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td class="hide-mobile-completed">' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + timeAgo(t.finished_at || t.merged_at) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderReview(items) {
  const sec = document.getElementById('review-section');
  const el = document.getElementById('review-body');
  const countEl = document.getElementById('review-count');

  if (items.length === 0) {
    sec.style.display = 'none';
    if (countEl) countEl.textContent = '';
    return;
  }
  sec.style.display = '';
  if (countEl) countEl.textContent = '(' + items.length + ')';

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Type</th><th class="hide-mobile">Reason</th><th>Action</th></tr></thead><tbody>';
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const meta = item.meta || {};
    const taskId = meta.task_id || '';
    const slug = shortSlug(taskId);
    const project = meta.project || '--';
    const itemType = meta.type || 'unknown';
    const reason = item.reason || '';
    const prStatus = item.pr_status || 'unknown';
    const safeId = taskId.replace(/'/g, "\\'");

    let actions = '';
    if (itemType === 'completed') {
      if (prStatus === 'merged') {
        actions += badge('merged') + ' ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      } else if (prStatus === 'closed') {
        actions += '<span class="badge" style="background:#2a2a2a;color:#888">closed</span> ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      } else {
        actions += '<button class="btn btn-merge" onclick="doMerge(\'' + safeId + '\', this)">Merge</button> ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      }
    } else if (itemType === 'failed' || itemType === 'blocked') {
      actions += '<button class="btn btn-fix" onclick="doAutofix(\'' + safeId + '\', this)">Auto-fix</button> ';
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else {
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    }

    html += '<tr>';
    html += '<td data-label="Task">' + esc(slug) + '</td>';
    html += '<td data-label="Project">' + esc(project) + '</td>';
    html += '<td data-label="Type">' + badge(itemType) + '</td>';
    html += '<td class="hide-mobile" data-label="Reason">' + esc(reason) + '</td>';
    html += '<td class="review-actions">' + actions + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderBacklog(tasks) {
  document.getElementById('backlog-count').textContent = '(' + tasks.length + ')';

  const el = document.getElementById('backlog-body');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty">No backlog items</div>';
    return;
  }

  let html = '<table><thead><tr><th>Pri</th><th>Task</th><th>Project</th><th class="hide-mobile">Est.</th><th class="hide-mobile">Category</th></tr></thead><tbody>';
  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    html += '<tr>';
    html += '<td>' + (t.priority != null ? t.priority : '--') + '</td>';
    html += '<td>' + esc(t.slug || t.id || '--') + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td class="hide-mobile">' + (t.estimated_minutes ? t.estimated_minutes + 'm' : '--') + '</td>';
    html += '<td class="hide-mobile">' + esc(t.category || '--') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Events ───────────────────────────────────

function formatEventTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function renderEvents(events) {
  const el = document.getElementById('events-chips');
  // Filter out past events older than 1 hour
  const now = Date.now();
  const relevant = events.filter(function(e) {
    if (e.status === 'past') {
      const end = new Date(e.end).getTime();
      return (now - end) < 3600000; // show past events for 1 hour
    }
    return true;
  });

  if (relevant.length === 0) {
    el.innerHTML = '<span class="event-all-clear">All clear</span>';
    return;
  }

  let html = '';
  for (let i = 0; i < relevant.length; i++) {
    const e = relevant[i];
    const start = formatEventTime(e.start);
    const end = formatEventTime(e.end);
    let text = start + '–' + end + ' ' + esc(e.title);
    if (e.freeze_from && e.status !== 'past') {
      text += '<span class="event-freeze-note"> — Freeze from ' + formatEventTime(e.freeze_from) + '</span>';
    }
    html += '<span class="event-chip status-' + esc(e.status) + '">' + text + '</span> ';
  }
  el.innerHTML = html;
}

// ── Event modal ──────────────────────────────

let projectsList = [];

function openEventModal() {
  document.getElementById('event-modal').classList.add('open');
  // Pre-fill date with today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('evt-date').value = today;
  // Load projects for checkboxes
  loadProjectCheckboxes();
}

function closeEventModal() {
  document.getElementById('event-modal').classList.remove('open');
}

async function loadProjectCheckboxes() {
  const el = document.getElementById('evt-freeze-projects');
  if (projectsList.length > 0) {
    renderProjectCheckboxes(el);
    return;
  }
  try {
    projectsList = await api('/api/projects');
  } catch (e) {
    projectsList = [];
  }
  renderProjectCheckboxes(el);
}

function renderProjectCheckboxes(el) {
  if (projectsList.length === 0) {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:11px">No projects found</span>';
    return;
  }
  let html = '';
  for (let i = 0; i < projectsList.length; i++) {
    const name = esc(projectsList[i].name);
    html += '<label><input type="checkbox" value="' + name + '"> ' + name + '</label>';
  }
  el.innerHTML = html;
}

async function submitEvent() {
  const title = document.getElementById('evt-title').value.trim();
  const date = document.getElementById('evt-date').value;
  const startTime = document.getElementById('evt-start').value;
  const endTime = document.getElementById('evt-end').value;

  if (!title || !date || !startTime || !endTime) {
    toast('Fill in title, date, start, and end time', false);
    return;
  }

  const start = date + 'T' + startTime + ':00Z';
  const end = date + 'T' + endTime + ':00Z';

  const freezeFrom = document.getElementById('evt-freeze-from').value;
  const freezeUntil = document.getElementById('evt-freeze-until').value;
  const notes = document.getElementById('evt-notes').value.trim();

  // Collect checked projects
  const checks = document.querySelectorAll('#evt-freeze-projects input:checked');
  const freezeProjects = [];
  for (let i = 0; i < checks.length; i++) {
    freezeProjects.push(checks[i].value);
  }

  const body = {
    title: title,
    start: start,
    end: end,
    freeze_projects: freezeProjects,
    freeze_from: freezeFrom ? date + 'T' + freezeFrom + ':00Z' : '',
    freeze_until: freezeUntil ? date + 'T' + freezeUntil + ':00Z' : '',
    notes: notes,
  };

  try {
    const res = await apiPost('/api/events', body);
    if (res.status === 'ok') {
      toast('Event added: ' + title, true);
      closeEventModal();
      // Clear form
      document.getElementById('evt-title').value = '';
      document.getElementById('evt-start').value = '';
      document.getElementById('evt-end').value = '';
      document.getElementById('evt-freeze-from').value = '';
      document.getElementById('evt-freeze-until').value = '';
      document.getElementById('evt-notes').value = '';
      refresh();
    } else {
      toast('Failed: ' + (res.message || ''), false);
    }
  } catch (e) {
    toast('Error: ' + e.message, false);
  }
}

function updateTimestamp() {
  const ago = Math.floor((Date.now() - lastFetch) / 1000);
  document.getElementById('updated').textContent = ago + 's ago';
}

// ── Command bar ─────────────────────────────

async function sendMessage() {
  var input = document.getElementById('cmd-input');
  var btn = document.getElementById('cmd-send');
  var text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    var res = await apiPost('/api/messages', { text: text });
    if (res.status === 'ok') {
      toast('Message queued — Claude will pick this up', true);
      input.value = '';
      loadRecentMessages();
    } else {
      toast('Failed: ' + (res.message || ''), false);
    }
  } catch (e) {
    toast('Error: ' + e.message, false);
  }

  btn.disabled = false;
  btn.textContent = 'Send';
}

async function loadRecentMessages() {
  try {
    recentMessages = await api('/api/messages?limit=5');
    renderMessages();
  } catch (e) {
    // silently fail
  }
}

function renderMessages() {
  var el = document.getElementById('cmd-messages');
  if (recentMessages.length === 0) {
    el.innerHTML = '';
    return;
  }

  var html = '';
  // Show in chronological order (oldest first, most recent at bottom near input)
  var msgs = recentMessages.slice().reverse();
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    var typeCls = (m.type === 'dispatch' || m.type === 'fix') ? ' ' + m.type : '';
    html += '<div class="cmd-msg">';
    html += '<span class="cmd-type' + typeCls + '">' + esc(m.type || 'instruction') + '</span>';
    html += '<span class="cmd-text">' + esc(m.text) + '</span>';
    html += '<span class="cmd-status ' + esc(m.status || 'pending') + '">' + esc(m.status || 'pending') + '</span>';
    html += '<span style="font-size:10px;color:var(--text-dim)">' + timeAgo(m.sent_at) + '</span>';
    html += '</div>';
  }
  el.innerHTML = html;
}

// ── Main refresh ────────────────────────────

async function refresh() {
  try {
    const [sys, svcs, tasks, review, backlog, events, messages] = await Promise.all([
      api('/api/system'),
      api('/api/services'),
      api('/api/tasks'),
      api('/api/review'),
      api('/api/backlog'),
      api('/api/events'),
      api('/api/messages?limit=5'),
    ]);

    lastFetch = Date.now();
    document.getElementById('live-dot').className = 'live-dot';

    allTasks = tasks;
    recentMessages = messages;
    renderSystem(sys);
    renderServices(svcs);
    renderEvents(events);
    renderFilterBar('active-filters', tasks);
    renderFilterBar('completed-filters', tasks);
    renderActiveTasks(tasks);
    renderCompleted(tasks);
    renderReview(review);
    renderBacklog(backlog);
    renderMessages();
  } catch (e) {
    document.getElementById('live-dot').className = 'live-dot dead';
    console.error('Refresh failed:', e);
  }
}

// ── Init ────────────────────────────────────

refresh();
setInterval(refresh, REFRESH);
setInterval(updateTimestamp, 1000);
</script>
</body>
</html>
