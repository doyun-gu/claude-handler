<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --bg-card: #222;
  --bg-hover: #2a2a2a;
  --border: #333;
  --text: #ccc;
  --text-dim: #888;
  --text-bright: #eee;
  --green: #5a5;
  --red: #a55;
  --blue: #68a;
  --yellow: #aa6;
  --orange: #a85;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", monospace;
  font-size: 13px;
  line-height: 1.5;
  padding: 0;
}

/* ── Header ─────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: #161616;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 12px;
}
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
.live-dot.dead { background: var(--red); }

/* ── Section ────────────────────────────── */
.section {
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
}
.section-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.section-header .toggle {
  font-size: 11px;
  color: var(--text-dim);
}

/* ── System bar ─────────────────────────── */
.sys-bar {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  font-size: 13px;
}
.sys-bar .val { color: var(--text-bright); }

/* ── Services bar ───────────────────────── */
.svc-bar {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 13px;
}
.svc-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  margin-left: 4px;
  vertical-align: middle;
}
.svc-dot.up { background: var(--green); }
.svc-dot.down { background: var(--red); }

/* ── Tables ─────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 6px 8px;
  border-bottom: 1px solid #2a2a2a;
  vertical-align: top;
}
tr:hover td { background: var(--bg-hover); }
tr.running td { border-left: 3px solid var(--blue); }
tr.queued td { color: var(--text-dim); }

/* ── Status badges ──────────────────────── */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
}
.badge-running { background: #1a3a4a; color: #7bc; }
.badge-completed { background: #1a3a1a; color: #7b7; }
.badge-failed { background: #3a1a1a; color: #b77; }
.badge-blocked { background: #3a2a1a; color: #ba7; }
.badge-queued { background: #2a2a2a; color: #888; }
.badge-merged { background: #1a2a3a; color: #79b; }
.badge-cancelled { background: #2a2a2a; color: #666; }
.badge-decision_needed { background: #2a2a1a; color: #aa8; }

/* ── Buttons ────────────────────────────── */
.btn {
  display: inline-block;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-hover); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-merge { border-color: #3a5a3a; color: #7b7; }
.btn-merge:hover { background: #1a3a1a; }
.btn-dismiss { border-color: #3a3a3a; color: #999; }
.btn-dismiss:hover { background: #2a2a2a; }
.btn-fix { border-color: #3a3a1a; color: #ba7; }
.btn-fix:hover { background: #2a2a1a; }

/* ── Toast ──────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  animation: fadeIn 0.2s;
  max-width: 360px;
}
.toast-ok { background: #1a3a1a; color: #7b7; border: 1px solid #3a5a3a; }
.toast-err { background: #3a1a1a; color: #b77; border: 1px solid #5a3a3a; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

/* ── Collapsible ────────────────────────── */
.collapsed .section-body { display: none; }

/* ── Empty state ────────────────────────── */
.empty { color: var(--text-dim); font-style: italic; padding: 8px 0; }

/* ── Responsive ─────────────────────────── */
@media (max-width: 768px) {
  /* 9/10. Prevent horizontal overflow */
  html, body { overflow-x: hidden; max-width: 100vw; }

  /* 5. Font — min 13px body, monospace headers can be 11px */
  body { font-size: 13px; }
  table { font-size: 13px; }
  th { font-size: 11px; }

  /* Section padding */
  .section { padding: 8px 12px; }
  .header { padding: 10px 12px; }
  .header h1 { font-size: 13px; }

  /* Hide columns on mobile */
  .hide-mobile { display: none; }

  /* 1. System stats — stack vertically (1 column) */
  .sys-bar {
    flex-direction: column;
    gap: 4px;
  }

  /* 2. Services/quick links — wrap to 2 per row */
  .svc-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }

  /* 3. Tables — horizontal scroll wrapper fallback */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -12px;
    padding: 0 12px;
  }
  td, th { padding: 6px 6px; }

  /* 4. Buttons — 44px tap target (Apple HIG) */
  .btn {
    min-height: 44px;
    min-width: 44px;
    padding: 8px 14px;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Events/toast — full width, text wraps */
  .toast-container {
    left: 12px;
    right: 12px;
    bottom: 12px;
  }
  .toast { max-width: none; }

  /* 7. Review queue — card layout on mobile */
  #review-body table,
  #review-body thead,
  #review-body tbody,
  #review-body th,
  #review-body tr,
  #review-body td {
    display: block;
  }
  #review-body thead { display: none; }
  #review-body table { border: none; }
  #review-body tr {
    margin-bottom: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
  }
  #review-body tr:hover td { background: transparent; }
  #review-body td {
    padding: 2px 0;
    border: none;
  }
  #review-body td.hide-mobile { display: none; }
  #review-body td::before {
    content: attr(data-label);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 8px;
  }
  #review-body td.review-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  #review-body td.review-actions::before { display: none; }
  #review-body td.review-actions .btn { flex: 1; }

  /* 8. Completed — task name + status badge only on mobile */
  .hide-mobile-completed { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Fleet Monitor</h1>
  <div class="header-right">
    <span id="updated">--</span>
    <span class="live-dot" id="live-dot"></span>
  </div>
</div>

<!-- System -->
<div class="section" id="sys-section">
  <div class="sys-bar" id="sys-bar">
    <span>CPU: <span class="val" id="sys-cpu">--</span></span>
    <span>RAM: <span class="val" id="sys-ram">--</span></span>
    <span>Disk: <span class="val" id="sys-disk">--</span></span>
    <span>Uptime: <span class="val" id="sys-uptime">--</span></span>
  </div>
</div>

<!-- Services -->
<div class="section" id="svc-section">
  <div class="svc-bar" id="svc-bar">--</div>
</div>

<!-- Active Tasks -->
<div class="section" id="active-section">
  <div class="section-label">Active Tasks</div>
  <div id="active-body"></div>
</div>

<!-- Completed (collapsible) -->
<div class="section" id="completed-section">
  <div class="section-header" onclick="toggleSection('completed-section')">
    <span class="section-label" style="margin-bottom:0">Completed <span id="completed-count"></span></span>
    <span class="toggle" id="completed-toggle">[hide]</span>
  </div>
  <div class="section-body" id="completed-body" style="margin-top:6px"></div>
</div>

<!-- Review Queue -->
<div class="section" id="review-section" style="display:none">
  <div class="section-label">Review Queue</div>
  <div id="review-body"></div>
</div>

<!-- Backlog -->
<div class="section" id="backlog-section">
  <div class="section-header" onclick="toggleSection('backlog-section')">
    <span class="section-label" style="margin-bottom:0">Backlog <span id="backlog-count"></span></span>
    <span class="toggle" id="backlog-toggle">[hide]</span>
  </div>
  <div class="section-body" id="backlog-body" style="margin-top:6px"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const REFRESH = 10000;
let lastFetch = 0;

// ── Helpers ─────────────────────────────────

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function duration(start, end) {
  if (!start) return '--';
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  const sec = Math.floor((e - s) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function badge(status) {
  const cls = 'badge-' + (status || 'queued');
  return '<span class="badge ' + cls + '">' + esc(status || 'unknown') + '</span>';
}

function shortBranch(b) {
  if (!b) return '--';
  return b.length > 30 ? b.slice(0, 28) + '..' : b;
}

function shortSlug(id) {
  if (!id) return '--';
  const m = id.match(/^\d{8}-\d{6}-(.+)$/);
  return m ? m[1] : id;
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function toggleSection(id) {
  const sec = document.getElementById(id);
  sec.classList.toggle('collapsed');
  const toggle = sec.querySelector('.toggle');
  if (toggle) toggle.textContent = sec.classList.contains('collapsed') ? '[show]' : '[hide]';
}

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Actions ─────────────────────────────────

async function doMerge(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'merging...';
  try {
    const res = await apiPost('/api/action', { type: 'merge', task_slug: slug });
    if (res.status === 'ok') {
      toast('Merged: ' + (res.message || slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Merge failed: ' + (res.message || 'unknown error'), false);
      btn.disabled = false;
      btn.textContent = 'Merge';
    }
  } catch (e) {
    toast('Merge error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Merge';
  }
}

async function doDismiss(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dismissing...';
  try {
    const res = await apiPost('/api/action', { type: 'skip', task_slug: slug });
    if (res.status === 'ok') {
      toast('Dismissed: ' + shortSlug(slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Dismiss failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Dismiss';
    }
  } catch (e) {
    toast('Dismiss error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Dismiss';
  }
}

async function doAutofix(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dispatching...';
  try {
    const res = await apiPost('/api/action', { type: 'fix', task_slug: slug });
    if (res.status === 'ok') {
      toast('Fix dispatched: ' + shortSlug(slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Fix failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Auto-fix';
    }
  } catch (e) {
    toast('Fix error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Auto-fix';
  }
}

// ── Renderers ───────────────────────────────

function renderSystem(data) {
  document.getElementById('sys-cpu').textContent = data.cpu_percent + '%';
  document.getElementById('sys-ram').textContent = data.ram_used_gb + '/' + data.ram_total_gb + ' GB';
  document.getElementById('sys-disk').textContent = (data.disk_free_gb || '--') + ' GB free';
  document.getElementById('sys-uptime').textContent = data.uptime || '--';
}

function renderServices(svcs) {
  const bar = document.getElementById('svc-bar');
  bar.innerHTML = svcs.map(function(s) {
    const up = s.status === 'up';
    const label = s.port ? s.name + ':' + s.port : s.name;
    return '<span>' + esc(label) + ' <span class="svc-dot ' + (up ? 'up' : 'down') + '"></span></span>';
  }).join('');
}

function renderActiveTasks(tasks) {
  const active = tasks.filter(function(t) { return t.status === 'running' || t.status === 'queued'; });
  const el = document.getElementById('active-body');

  if (active.length === 0) {
    el.innerHTML = '<div class="empty">No active tasks</div>';
    return;
  }

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Branch</th></tr></thead><tbody>';
  for (let i = 0; i < active.length; i++) {
    const t = active[i];
    const cls = t.status === 'running' ? 'running' : 'queued';
    html += '<tr class="' + cls + '">';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + esc(shortBranch(t.branch)) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderCompleted(tasks) {
  const cutoff = Date.now() - 24 * 3600 * 1000;
  const recent = tasks.filter(function(t) {
    if (t.status !== 'completed' && t.status !== 'merged' && t.status !== 'failed') return false;
    const fin = t.finished_at || t.merged_at;
    if (!fin) return false;
    return new Date(fin).getTime() > cutoff;
  });

  document.getElementById('completed-count').textContent = '(' + recent.length + ')';

  const el = document.getElementById('completed-body');
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty">No completed tasks in last 24h</div>';
    return;
  }

  let html = '<table><thead><tr><th>Task</th><th class="hide-mobile-completed">Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Finished</th></tr></thead><tbody>';
  for (let i = 0; i < recent.length; i++) {
    const t = recent[i];
    html += '<tr>';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td class="hide-mobile-completed">' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + timeAgo(t.finished_at || t.merged_at) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderReview(items) {
  const sec = document.getElementById('review-section');
  const el = document.getElementById('review-body');

  if (items.length === 0) {
    sec.style.display = 'none';
    return;
  }
  sec.style.display = '';

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Type</th><th class="hide-mobile">Reason</th><th>Action</th></tr></thead><tbody>';
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const meta = item.meta || {};
    const taskId = meta.task_id || '';
    const slug = shortSlug(taskId);
    const project = meta.project || '--';
    const itemType = meta.type || 'unknown';
    const reason = item.reason || '';
    const safeId = taskId.replace(/'/g, "\\'");

    let actions = '';
    if (itemType === 'completed') {
      actions += '<button class="btn btn-merge" onclick="doMerge(\'' + safeId + '\', this)">Merge</button> ';
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else if (itemType === 'failed' || itemType === 'blocked') {
      actions += '<button class="btn btn-fix" onclick="doAutofix(\'' + safeId + '\', this)">Auto-fix</button> ';
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else {
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    }

    html += '<tr>';
    html += '<td data-label="Task">' + esc(slug) + '</td>';
    html += '<td data-label="Project">' + esc(project) + '</td>';
    html += '<td data-label="Type">' + badge(itemType) + '</td>';
    html += '<td class="hide-mobile" data-label="Reason">' + esc(reason) + '</td>';
    html += '<td class="review-actions">' + actions + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderBacklog(tasks) {
  document.getElementById('backlog-count').textContent = '(' + tasks.length + ')';

  const el = document.getElementById('backlog-body');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty">No backlog items</div>';
    return;
  }

  let html = '<table><thead><tr><th>Pri</th><th>Task</th><th>Project</th><th class="hide-mobile">Est.</th><th class="hide-mobile">Category</th></tr></thead><tbody>';
  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    html += '<tr>';
    html += '<td>' + (t.priority != null ? t.priority : '--') + '</td>';
    html += '<td>' + esc(t.slug || t.id || '--') + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td class="hide-mobile">' + (t.estimated_minutes ? t.estimated_minutes + 'm' : '--') + '</td>';
    html += '<td class="hide-mobile">' + esc(t.category || '--') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function updateTimestamp() {
  const ago = Math.floor((Date.now() - lastFetch) / 1000);
  document.getElementById('updated').textContent = ago + 's ago';
}

// ── Main refresh ────────────────────────────

async function refresh() {
  try {
    const [sys, svcs, tasks, review, backlog] = await Promise.all([
      api('/api/system'),
      api('/api/services'),
      api('/api/tasks'),
      api('/api/review'),
      api('/api/backlog'),
    ]);

    lastFetch = Date.now();
    document.getElementById('live-dot').className = 'live-dot';

    renderSystem(sys);
    renderServices(svcs);
    renderActiveTasks(tasks);
    renderCompleted(tasks);
    renderReview(review);
    renderBacklog(backlog);
  } catch (e) {
    document.getElementById('live-dot').className = 'live-dot dead';
    console.error('Refresh failed:', e);
  }
}

// ── Init ────────────────────────────────────

refresh();
setInterval(refresh, REFRESH);
setInterval(updateTimestamp, 1000);
</script>
</body>
</html>
