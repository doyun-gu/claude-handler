<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --bg-surface: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #222;
  --border: #2a2a2a;
  --border-subtle: #1f1f1f;
  --text: #a0a0a0;
  --text-dim: #666;
  --text-bright: #e0e0e0;
  --text-white: #f0f0f0;
  --running: #3b82f6;
  --running-bg: #1a2744;
  --queued: #6b7280;
  --queued-bg: #1a1a1a;
  --completed: #22c55e;
  --completed-bg: #132a1a;
  --failed: #ef4444;
  --failed-bg: #2a1414;
  --merged: #8b5cf6;
  --merged-bg: #1f1a33;
  --blocked: #f59e0b;
  --blocked-bg: #2a2210;
  --radius: 6px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-width: 1200px;
}

/* ── Top Bar ───────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.topbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-white);
  letter-spacing: 0.5px;
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
}
.topbar-stats {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  color: var(--text-dim);
}
.topbar-stats .stat-val {
  color: var(--text);
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.svc-dots {
  display: flex;
  align-items: center;
  gap: 8px;
}
.svc-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.svc-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.svc-dot.up { background: var(--completed); }
.svc-dot.down { background: var(--failed); }
.live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--completed);
}
.live-dot.dead { background: var(--failed); }

/* ── Main Layout ───────────────────────── */
.main {
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Kanban Pipeline ───────────────────── */
.pipeline-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.pipeline {
  display: flex;
  gap: 12px;
}
.pipeline-col {
  flex: 1;
  min-width: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.col-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-bright);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 42px;
}
.col-header .task-count {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-dim);
}
.col-body {
  padding: 8px;
  min-height: 80px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Running task card */
.task-card {
  padding: 10px 12px;
  border-radius: 4px;
  margin-bottom: 6px;
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  font-size: 12px;
}
.task-card:last-child { margin-bottom: 0; }

.task-card.running {
  background: var(--running-bg);
  border: 1px solid rgba(59, 130, 246, 0.3);
}
.task-card.queued {
  background: var(--queued-bg);
  border: 1px solid var(--border-subtle);
}
.task-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.task-name {
  color: var(--text-bright);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.task-card.queued .task-name {
  color: var(--text);
}
.task-badge {
  flex-shrink: 0;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-running { background: var(--running-bg); color: var(--running); border: 1px solid rgba(59,130,246,0.3); }
.badge-queued { background: var(--queued-bg); color: var(--queued); border: 1px solid var(--border); }
.badge-completed { background: var(--completed-bg); color: var(--completed); border: 1px solid rgba(34,197,94,0.3); }
.badge-failed { background: var(--failed-bg); color: var(--failed); border: 1px solid rgba(239,68,68,0.3); }
.badge-merged { background: var(--merged-bg); color: var(--merged); border: 1px solid rgba(139,92,246,0.3); }
.badge-blocked { background: var(--blocked-bg); color: var(--blocked); border: 1px solid rgba(245,158,11,0.3); }

.task-timer {
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-dim);
}
.timer-bar {
  flex: 1;
  height: 3px;
  background: rgba(59, 130, 246, 0.15);
  border-radius: 2px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  background: var(--running);
  border-radius: 2px;
  transition: width 1s linear;
}
.timer-text {
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  color: var(--running);
  font-weight: 500;
}

.queue-number {
  color: var(--text-dim);
  font-size: 11px;
  margin-right: 6px;
}

.col-idle {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-dim);
  font-style: italic;
  font-size: 12px;
}

/* ── Charts Grid ───────────────────────── */
.charts-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.charts-section-header .section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.charts-section-header .toggle {
  font-size: 11px;
  color: var(--text-dim);
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
}
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
.chart-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.chart-card h3 {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  font-weight: 500;
}
.chart-card canvas {
  max-height: 180px;
}

/* ── Review Queue ──────────────────────── */
.section-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-box-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
}
.section-box-header .section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.section-box-header .badge-count {
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-card);
  color: var(--text-dim);
  margin-left: 8px;
}
.section-box-header .toggle {
  font-size: 11px;
  color: var(--text-dim);
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
}
.section-box-body {
  padding: 0;
}

/* ── Tables ────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }

.task-slug {
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  color: var(--text-bright);
  font-weight: 500;
}

/* ── Buttons ───────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  gap: 4px;
}
.btn:hover { background: var(--bg-hover); color: var(--text-bright); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-merge { border-color: rgba(34,197,94,0.3); color: var(--completed); }
.btn-merge:hover { background: var(--completed-bg); }
.btn-dismiss { border-color: var(--border); color: var(--text-dim); }
.btn-dismiss:hover { background: var(--bg-hover); }
.btn-fix { border-color: rgba(245,158,11,0.3); color: var(--blocked); }
.btn-fix:hover { background: var(--blocked-bg); }

.review-actions {
  display: flex;
  gap: 6px;
}

/* ── Filter Pills ──────────────────────── */
.filter-pills {
  display: flex;
  gap: 6px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-subtle);
}
.filter-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  transition: all 0.15s;
}
.filter-pill:hover { background: var(--bg-hover); color: var(--text); }
.filter-pill.active { background: var(--running-bg); color: var(--running); border-color: rgba(59,130,246,0.3); }

/* ── Collapsed state ───────────────────── */
.collapsed .section-box-body,
.collapsed .charts-body { display: none; }

/* ── Toast ─────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  animation: fadeIn 0.2s;
  max-width: 360px;
}
.toast-ok { background: var(--completed-bg); color: var(--completed); border: 1px solid rgba(34,197,94,0.3); }
.toast-err { background: var(--failed-bg); color: var(--failed); border: 1px solid rgba(239,68,68,0.3); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

/* ── Events bar ────────────────────────── */
.events-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.event-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
}
.event-chip.status-upcoming { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); }
.event-chip.status-imminent { background: var(--blocked-bg); color: var(--blocked); border: 1px solid rgba(245,158,11,0.3); }
.event-chip.status-active { background: var(--failed-bg); color: var(--failed); border: 1px solid rgba(239,68,68,0.3); }
.event-chip.status-past { background: var(--bg-card); color: var(--text-dim); text-decoration: line-through; border: 1px solid var(--border-subtle); }
.event-all-clear {
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--completed-bg);
  color: var(--completed);
  font-size: 11px;
  border: 1px solid rgba(34,197,94,0.2);
}
.event-freeze-note {
  font-size: 10px;
  color: var(--blocked);
  margin-left: 4px;
}

/* ── Event modal ───────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 420px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 14px;
  color: var(--text-white);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input[type="text"],
.modal input[type="date"],
.modal input[type="time"],
.modal textarea {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
}
.modal input:focus, .modal textarea:focus {
  outline: none;
  border-color: var(--running);
}
.modal textarea { resize: vertical; min-height: 40px; }
.modal .row { display: flex; gap: 12px; }
.modal .row > div { flex: 1; }
.modal .checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.modal .checkbox-group label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  text-transform: none;
  font-size: 12px;
  color: var(--text);
  margin: 0;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

/* ── Empty state ───────────────────────── */
.empty { color: var(--text-dim); font-style: italic; padding: 12px 14px; font-size: 12px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">FLEET MONITOR</span>
    <div class="topbar-stats" id="sys-bar">
      <span>CPU <span class="stat-val" id="sys-cpu">--</span></span>
      <span>RAM <span class="stat-val" id="sys-ram">--</span></span>
      <span>Disk <span class="stat-val" id="sys-disk">--</span></span>
      <span>Up <span class="stat-val" id="sys-uptime">--</span></span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="svc-dots" id="svc-bar"></div>
    <div class="live-indicator">
      <span class="live-dot" id="live-dot"></span>
      <span id="updated">--</span>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <h2>Add Event</h2>
    <label>Title</label>
    <input type="text" id="evt-title" placeholder="e.g. Supervisor Meeting">
    <div class="row">
      <div><label>Date</label><input type="date" id="evt-date"></div>
    </div>
    <div class="row">
      <div><label>Start time</label><input type="time" id="evt-start"></div>
      <div><label>End time</label><input type="time" id="evt-end"></div>
    </div>
    <label>Freeze projects</label>
    <div class="checkbox-group" id="evt-freeze-projects"></div>
    <div class="row">
      <div><label>Freeze from</label><input type="time" id="evt-freeze-from"></div>
      <div><label>Freeze until</label><input type="time" id="evt-freeze-until"></div>
    </div>
    <label>Notes</label>
    <textarea id="evt-notes" rows="2"></textarea>
    <div class="modal-actions">
      <button class="btn btn-dismiss" onclick="closeEventModal()">Cancel</button>
      <button class="btn btn-merge" onclick="submitEvent()">Save</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Events (inline, compact) -->
  <div class="events-bar" id="events-bar" style="display:none">
    <span id="events-chips"></span>
    <button class="btn" onclick="openEventModal()" style="font-size:11px; padding:2px 8px">+ Event</button>
  </div>

  <!-- Kanban Pipeline -->
  <div>
    <div class="pipeline-label">Worker Pipeline</div>
    <div class="pipeline" id="pipeline"></div>
  </div>

  <!-- Charts -->
  <div id="charts-wrapper">
    <div class="charts-section-header" onclick="toggleCharts()">
      <span class="section-label">Analytics</span>
      <span class="toggle" id="charts-toggle">[hide]</span>
    </div>
    <div class="charts-body" style="margin-top:8px">
      <div class="charts-grid">
        <div class="chart-card">
          <h3>Task Timeline (24h)</h3>
          <canvas id="chart-timeline"></canvas>
        </div>
        <div class="chart-card">
          <h3>Queue Depth (24h)</h3>
          <canvas id="chart-queue"></canvas>
        </div>
        <div class="chart-card">
          <h3>Cost / Token Usage (7d)</h3>
          <canvas id="chart-costs"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Review Queue -->
  <div class="section-box" id="review-section" style="display:none">
    <div class="section-box-header" onclick="toggleSection('review-section')">
      <div>
        <span class="section-label">Review Queue</span>
        <span class="badge-count" id="review-count">0</span>
      </div>
      <span class="toggle" id="review-toggle">[hide]</span>
    </div>
    <div class="section-box-body" id="review-body"></div>
  </div>

  <!-- Completed (collapsed by default) -->
  <div class="section-box collapsed" id="completed-section">
    <div class="section-box-header" onclick="toggleSection('completed-section')">
      <div>
        <span class="section-label">Completed</span>
        <span class="badge-count" id="completed-count">0</span>
      </div>
      <span class="toggle" id="completed-toggle">[show]</span>
    </div>
    <div class="section-box-body">
      <div class="filter-pills" id="project-filters"></div>
      <div id="completed-body"></div>
    </div>
  </div>

  <!-- Backlog (collapsed by default) -->
  <div class="section-box collapsed" id="backlog-section">
    <div class="section-box-header" onclick="toggleSection('backlog-section')">
      <div>
        <span class="section-label">Backlog</span>
        <span class="badge-count" id="backlog-count">0</span>
      </div>
      <span class="toggle" id="backlog-toggle">[show]</span>
    </div>
    <div class="section-box-body" id="backlog-body"></div>
  </div>

</div>

<div class="toast-container" id="toasts"></div>

<script>
const REFRESH = 10000;
let lastFetch = 0;
let activeProjectFilter = null;
let allTasks = [];

// Chart instances
let chartTimeline = null;
let chartQueue = null;
let chartCosts = null;

// ── Helpers ────────────────────────────────

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function duration(start, end) {
  if (!start) return '--';
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  const sec = Math.floor((e - s) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function shortSlug(id) {
  if (!id) return '--';
  const m = id.match(/^\d{8}-\d{6}-(.+)$/);
  return m ? m[1] : id;
}

function badge(status) {
  return '<span class="task-badge badge-' + (status || 'queued') + '">' + esc(status || 'unknown') + '</span>';
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function toggleSection(id) {
  const sec = document.getElementById(id);
  sec.classList.toggle('collapsed');
  const toggle = sec.querySelector('.toggle');
  if (toggle) toggle.textContent = sec.classList.contains('collapsed') ? '[show]' : '[hide]';
}

function toggleCharts() {
  const wrapper = document.getElementById('charts-wrapper');
  wrapper.classList.toggle('collapsed');
  const toggle = document.getElementById('charts-toggle');
  toggle.textContent = wrapper.classList.contains('collapsed') ? '[show]' : '[hide]';

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

function renderPipeline(queueData) {
  const el = document.getElementById('pipeline');

  // Filter to only show projects with tasks (running or queued), plus all idle ones
  // Hide 'unknown' column if it has no tasks
  const hasWork = queueData.filter(p => p.running || p.queued.length > 0);
  const idle = queueData.filter(p => !p.running && p.queued.length === 0 && p.project !== 'unknown');

  // Show projects with work first, then idle
  const sorted = [...hasWork, ...idle];

  if (sorted.length === 0) {
    el.innerHTML = '<div class="col-idle" style="width:100%;min-height:100px">No projects registered</div>';
    return;
  }

  let html = '';
  for (const proj of sorted) {
    const totalTasks = (proj.running ? 1 : 0) + proj.queued.length;

    html += '<div class="pipeline-col">';
    html += '<div class="col-header">';
    html += '<span>' + esc(proj.project) + '</span>';
    if (totalTasks > 0) {
      html += '<span class="task-count">' + totalTasks + ' task' + (totalTasks > 1 ? 's' : '') + '</span>';
    }
    html += '</div>';
    html += '<div class="col-body">';

    if (!proj.running && proj.queued.length === 0) {
      html += '<div class="col-idle">(idle)</div>';
    } else {
      // Running task
      if (proj.running) {
        const t = proj.running;
        const slug = shortSlug(t.id || t.slug);
        const elapsed = t.elapsed_display || duration(t.started_at);
        // Estimate progress: assume budget * 60 min per $, cap at 100%
        const budget = t.budget_usd || 10;
        const elapsedSec = t.elapsed_seconds || 0;
        const estimatedSec = budget * 60 * 60; // rough: $1 = 1hr
        const pct = Math.min(Math.round((elapsedSec / Math.max(estimatedSec, 1)) * 100), 95);

        html += '<div class="task-card running">';
        html += '<div class="task-card-top">';
        html += '<span class="task-name">' + esc(slug) + '</span>';
        html += badge('running');
        html += '</div>';
        html += '<div class="task-timer">';
        html += '<span class="timer-text">' + esc(elapsed) + '</span>';
        html += '<div class="timer-bar"><div class="timer-fill" style="width:' + pct + '%"></div></div>';
        html += '</div>';
        html += '</div>';
      }

      // Queued tasks
      for (let i = 0; i < proj.queued.length; i++) {
        const t = proj.queued[i];
        const slug = shortSlug(t.id || t.slug);
        html += '<div class="task-card queued">';
        html += '<div class="task-card-top">';
        html += '<span class="task-name"><span class="queue-number">' + (i + 1) + '.</span>' + esc(slug) + '</span>';
        html += badge('queued');
        html += '</div>';
        html += '</div>';
      }
    }

    html += '</div></div>';
  }
  el.innerHTML = html;
}

function renderCompleted(tasks) {
  const cutoff = Date.now() - 24 * 3600 * 1000;
  let recent = tasks.filter(function(t) {
    if (t.status !== 'completed' && t.status !== 'merged' && t.status !== 'failed') return false;
    const fin = t.finished_at || t.merged_at;
    if (!fin) return false;
    return new Date(fin).getTime() > cutoff;
  });

  if (activeProjectFilter) {
    recent = recent.filter(function(t) { return t.project_name === activeProjectFilter; });
  }

  document.getElementById('completed-count').textContent = recent.length;

  const el = document.getElementById('completed-body');
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty">No completed tasks' + (activeProjectFilter ? ' for ' + esc(activeProjectFilter) : ' in last 24h') + '</div>';
    return;
  }

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Status</th><th>Duration</th><th>Finished</th></tr></thead><tbody>';
  for (const t of recent) {
    html += '<tr>';
    html += '<td><span class="task-slug">' + esc(shortSlug(t.id || t.slug)) + '</span></td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td>' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td>' + timeAgo(t.finished_at || t.merged_at) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function setProjectFilter(project) {
  activeProjectFilter = project;
  document.querySelectorAll('.filter-pill').forEach(function(pill) {
    pill.classList.toggle('active', pill.dataset.project === (project || ''));
  });
  renderCompleted(allTasks);
}

function renderProjectFilters(tasks) {
  const cutoff = Date.now() - 24 * 3600 * 1000;
  const recent = tasks.filter(function(t) {
    if (t.status !== 'completed' && t.status !== 'merged' && t.status !== 'failed') return false;
    const fin = t.finished_at || t.merged_at;
    return fin && new Date(fin).getTime() > cutoff;
  });

  const counts = {};
  for (const t of recent) {
    const p = t.project_name || 'unknown';
    counts[p] = (counts[p] || 0) + 1;
  }

  const el = document.getElementById('project-filters');
  if (Object.keys(counts).length <= 1) {
    el.innerHTML = '';
    return;
  }

  let html = '<button class="filter-pill' + (activeProjectFilter === null ? ' active' : '') + '" data-project="" onclick="setProjectFilter(null)">All (' + recent.length + ')</button>';
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  for (const [name, count] of sorted) {
    const isActive = activeProjectFilter === name;
    html += '<button class="filter-pill' + (isActive ? ' active' : '') + '" data-project="' + esc(name) + '" onclick="setProjectFilter(\'' + esc(name).replace(/'/g, "\\'") + '\')">' + esc(name) + ' (' + count + ')</button>';
  }
  el.innerHTML = html;
}

function renderReview(items) {
  const sec = document.getElementById('review-section');
  const el = document.getElementById('review-body');
  const countEl = document.getElementById('review-count');

  if (items.length === 0) {
    sec.style.display = 'none';
    countEl.textContent = '0';
    return;
  }
  sec.style.display = '';
  countEl.textContent = items.length;

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Type</th><th>Reason</th><th>Action</th></tr></thead><tbody>';
  for (const item of items) {
    const meta = item.meta || {};
    const taskId = meta.task_id || '';
    const slug = shortSlug(taskId);
    const project = meta.project || '--';
    const itemType = meta.type || 'unknown';
    const reason = item.reason || '';
    const prStatus = item.pr_status || 'unknown';
    const safeId = taskId.replace(/'/g, "\\'");

    let actions = '<div class="review-actions">';
    if (itemType === 'completed') {
      if (prStatus === 'merged') {
        actions += badge('merged') + ' ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      } else if (prStatus === 'closed') {
        actions += '<span class="task-badge" style="background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border)">closed</span> ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      } else {
        actions += '<button class="btn btn-merge" onclick="doMerge(\'' + safeId + '\', this)">Merge</button>';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      }
    } else if (itemType === 'failed' || itemType === 'blocked') {
      actions += '<button class="btn btn-fix" onclick="doAutofix(\'' + safeId + '\', this)">Auto-fix</button>';
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else {
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    }
    actions += '</div>';

    html += '<tr>';
    html += '<td><span class="task-slug">' + esc(slug) + '</span></td>';
    html += '<td>' + esc(project) + '</td>';
    html += '<td>' + badge(itemType) + '</td>';
    html += '<td style="color:var(--text-dim);font-size:11px">' + esc(reason) + '</td>';
    html += '<td>' + actions + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderBacklog(tasks) {
  document.getElementById('backlog-count').textContent = tasks.length;
  const el = document.getElementById('backlog-body');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty">No backlog items</div>';

    html += '<tr>';

    html += '<td>' + esc(t.project_name || '--') + '</td>';

function formatEventTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function renderEvents(events) {
  const bar = document.getElementById('events-bar');
  const el = document.getElementById('events-chips');
  const now = Date.now();
  const relevant = events.filter(function(e) {
    if (e.status === 'past') {
      const end = new Date(e.end).getTime();
      return (now - end) < 3600000;
    }
    return true;
  });

  if (relevant.length === 0) {
    bar.style.display = 'none';
    return;
  }

  bar.style.display = 'flex';
  let html = '';
  for (const e of relevant) {
    const start = formatEventTime(e.start);
    const end = formatEventTime(e.end);
    let text = start + '\u2013' + end + ' ' + esc(e.title);
    if (e.freeze_from && e.status !== 'past') {
      text += '<span class="event-freeze-note"> \u2014 Freeze from ' + formatEventTime(e.freeze_from) + '</span>';
    }
    html += '<span class="event-chip status-' + esc(e.status) + '">' + text + '</span> ';
  }
  el.innerHTML = html;
}

let projectsList = [];

function openEventModal() {
  document.getElementById('event-modal').classList.add('open');
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('evt-date').value = today;
  loadProjectCheckboxes();
}

function closeEventModal() {
  document.getElementById('event-modal').classList.remove('open');
}

async function loadProjectCheckboxes() {
  const el = document.getElementById('evt-freeze-projects');
  if (projectsList.length > 0) { renderProjectCheckboxes(el); return; }
  try { projectsList = await api('/api/projects'); } catch (e) { projectsList = []; }
  renderProjectCheckboxes(el);
}

function renderProjectCheckboxes(el) {
  if (projectsList.length === 0) {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:11px">No projects found</span>';
    return;
  }
  el.innerHTML = projectsList.map(p =>
    '<label><input type="checkbox" value="' + esc(p.name) + '"> ' + esc(p.name) + '</label>'
  ).join('');
}

async function submitEvent() {
  const title = document.getElementById('evt-title').value.trim();
  const date = document.getElementById('evt-date').value;
  const startTime = document.getElementById('evt-start').value;
  const endTime = document.getElementById('evt-end').value;
  if (!title || !date || !startTime || !endTime) {
    toast('Fill in title, date, start, and end time', false);
    return;
  }
  const start = date + 'T' + startTime + ':00Z';
  const end = date + 'T' + endTime + ':00Z';
  const freezeFrom = document.getElementById('evt-freeze-from').value;
  const freezeUntil = document.getElementById('evt-freeze-until').value;
  const notes = document.getElementById('evt-notes').value.trim();
  const checks = document.querySelectorAll('#evt-freeze-projects input:checked');
  const freezeProjects = Array.from(checks).map(c => c.value);

  try {
    const res = await apiPost('/api/events', {
      title, start, end,
      freeze_projects: freezeProjects,
      freeze_from: freezeFrom ? date + 'T' + freezeFrom + ':00Z' : '',
      freeze_until: freezeUntil ? date + 'T' + freezeUntil + ':00Z' : '',
      notes,
    });
    if (res.status === 'ok') {
      toast('Event added: ' + title, true);
      closeEventModal();
      document.getElementById('evt-title').value = '';
      document.getElementById('evt-start').value = '';
      document.getElementById('evt-end').value = '';
      document.getElementById('evt-freeze-from').value = '';
      document.getElementById('evt-freeze-until').value = '';
      document.getElementById('evt-notes').value = '';
      refresh();
    } else {
      toast('Failed: ' + (res.message || ''), false);
    }
  } catch (e) {
    toast('Error: ' + e.message, false);
  }
}

const STATUS_COLORS = {
  running: '#3b82f6',
  completed: '#22c55e',
  merged: '#8b5cf6',
  failed: '#ef4444',
  queued: '#6b7280',
};
const PROJECT_COLORS = ['#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4', '#ec4899', '#84cc16'];

function renderTimelineChart(data) {
  const ctx = document.getElementById('chart-timeline');
  if (!ctx) return;

  // Build horizontal bar data: each task is a bar from start to end
  const tasks = data.filter(t => t.started_at);
  const labels = tasks.map(t => shortSlug(t.id || t.slug));
  const barData = tasks.map(t => t.duration_minutes || 0);
  const colors = tasks.map(t => STATUS_COLORS[t.status] || STATUS_COLORS.queued);

  if (chartTimeline) chartTimeline.destroy();
  chartTimeline = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Duration (min)',
        data: barData,
        backgroundColor: colors.map(c => c + '99'),
        borderColor: colors,
        borderWidth: 1,
        borderRadius: 2,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const t = tasks[ctx.dataIndex];
              return (t.status || '') + ': ' + ctx.raw.toFixed(1) + 'm (' + (t.project_name || '') + ')';
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Minutes', color: '#666', font: { size: 10 } },
          ticks: { color: '#666', font: { size: 10 } },
          grid: { color: '#1f1f1f' },
        },
        y: {
          ticks: { color: '#888', font: { size: 10, family: '"SF Mono", "Fira Code", monospace' } },
          grid: { display: false },
        },
      },
    },
  });
}

function renderQueueChart(data) {
  const ctx = document.getElementById('chart-queue');
  if (!ctx) return;

  const labels = [];
  const queued = [];
  const running = [];
  for (let i = 0; i < data.length; i += 2) {
    labels.push(data[i].hour);
    queued.push(data[i].queued);
    running.push(data[i].running);
  }

  if (chartQueue) chartQueue.destroy();
  chartQueue = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Queued',
          data: queued,
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.08)',
          fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5,
        },
        {
          label: 'Running',
          data: running,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.08)',
          fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#666', boxWidth: 10, font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#666', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#1f1f1f' } },
        y: { beginAtZero: true, ticks: { color: '#666', font: { size: 10 }, stepSize: 1 }, grid: { color: '#1f1f1f' } },
      },
    },
  });
}

function renderCostsChart(data) {
  const ctx = document.getElementById('chart-costs');
  if (!ctx) return;

  if (data.length === 0) {
    // Fallback: show empty state
    if (chartCosts) chartCosts.destroy();
    chartCosts = new Chart(ctx, {
      type: 'bar',
      data: { labels: ['No data'], datasets: [{ data: [0], backgroundColor: '#1f1f1f' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#666' }, grid: { color: '#1f1f1f' } },
          y: { ticks: { color: '#666' }, grid: { color: '#1f1f1f' } },
        },
      },
    });
    return;
  }

  // Group by day, then by project for stacked bars
  const dayMap = {};
  const projectSet = new Set();
  for (const row of data) {
    const day = row.day;
    const proj = row.project_name || 'unknown';
    projectSet.add(proj);
    if (!dayMap[day]) dayMap[day] = {};
    dayMap[day][proj] = (dayMap[day][proj] || 0) + (row.total_budget || 0);
  }

  // Fill missing days
  const days = [];
  const now = new Date();
  for (let d = 6; d >= 0; d--) {
    const date = new Date(now);
    date.setDate(date.getDate() - d);
    days.push(date.toISOString().slice(0, 10));
  }

  const projects = Array.from(projectSet);
  const datasets = projects.map((proj, i) => ({
    label: proj,
    data: days.map(d => (dayMap[d] && dayMap[d][proj]) || 0),
    backgroundColor: (PROJECT_COLORS[i % PROJECT_COLORS.length]) + '99',
    borderColor: PROJECT_COLORS[i % PROJECT_COLORS.length],
    borderWidth: 1,
    borderRadius: 2,
  }));

  const dayLabels = days.map(d => {
    const date = new Date(d + 'T00:00:00');
    return date.toLocaleDateString([], { weekday: 'short' });
  });

  if (chartCosts) chartCosts.destroy();
  chartCosts = new Chart(ctx, {
    type: 'bar',
    data: { labels: dayLabels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: projects.length > 1, labels: { color: '#666', boxWidth: 10, font: { size: 10 } } },
        tooltip: {
          callbacks: {
            label: function(ctx) { return ctx.dataset.label + ': $' + ctx.raw.toFixed(2); }
          }
        },
      },
      scales: {
        x: { stacked: true, ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#1f1f1f' } },
        y: {
          stacked: true, beginAtZero: true,
          title: { display: true, text: 'USD', color: '#666', font: { size: 10 } },
          ticks: { color: '#666', font: { size: 10 }, callback: v => '$' + v },
          grid: { color: '#1f1f1f' },
        },
      },
    },
  });
}

// ── Main refresh ───────────────────────────

async function refresh() {
  try {
    const [sys, svcs, tasks, queue, review, backlog, events] = await Promise.all([
      api('/api/system'),
      api('/api/services'),
      api('/api/tasks'),
      api('/api/queue'),
      api('/api/review'),
      api('/api/backlog'),
      api('/api/events'),
    ]);

    lastFetch = Date.now();
    allTasks = tasks;
    document.getElementById('live-dot').className = 'live-dot';

    renderSystem(sys);
    renderServices(svcs);
    renderPipeline(queue);
    renderEvents(events);
    renderProjectFilters(tasks);
    renderCompleted(tasks);
    renderReview(review);
    renderBacklog(backlog);
  } catch (e) {
    document.getElementById('live-dot').className = 'live-dot dead';
    console.error('Refresh failed:', e);
  }
}

// ── Init ───────────────────────────────────

refresh();
refreshCharts();
setInterval(refresh, REFRESH);
setInterval(refreshCharts, 60000);
setInterval(updateTimestamp, 1000);
</script>
</body>
