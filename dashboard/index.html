<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --bg-card: #222;
  --bg-hover: #2a2a2a;
  --border: #333;
  --text: #ccc;
  --text-dim: #888;
  --text-bright: #eee;
  --green: #5a5;
  --red: #a55;
  --blue: #68a;
  --yellow: #aa6;
  --orange: #a85;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", monospace;
  font-size: 13px;
  line-height: 1.5;
  padding: 0;
}

/* ── Header ─────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: #161616;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 12px;
}
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
.live-dot.dead { background: var(--red); }

/* ── Section ────────────────────────────── */
.section {
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
}
.section-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.section-header .toggle {
  font-size: 11px;
  color: var(--text-dim);
}

/* ── System bar ─────────────────────────── */
.sys-bar {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  font-size: 13px;
}
.sys-bar .val { color: var(--text-bright); }

/* ── Services bar ───────────────────────── */
.svc-bar {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 13px;
}
.svc-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  margin-left: 4px;
  vertical-align: middle;
}
.svc-dot.up { background: var(--green); }
.svc-dot.down { background: var(--red); }

/* ── Tables ─────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 6px 8px;
  border-bottom: 1px solid #2a2a2a;
  vertical-align: top;
}
tr:hover td { background: var(--bg-hover); }
tr.running td { border-left: 3px solid var(--blue); }
tr.queued td { color: var(--text-dim); }

/* ── Status badges ──────────────────────── */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
}
.badge-running { background: #1a3a4a; color: #7bc; }
.badge-completed { background: #1a3a1a; color: #7b7; }
.badge-failed { background: #3a1a1a; color: #b77; }
.badge-blocked { background: #3a2a1a; color: #ba7; }
.badge-queued { background: #2a2a2a; color: #888; }
.badge-merged { background: #1a2a3a; color: #79b; }
.badge-cancelled { background: #2a2a2a; color: #666; }
.badge-decision_needed { background: #2a2a1a; color: #aa8; }

/* ── Buttons ────────────────────────────── */
.btn {
  display: inline-block;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-hover); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-merge { border-color: #3a5a3a; color: #7b7; }
.btn-merge:hover { background: #1a3a1a; }
.btn-dismiss { border-color: #3a3a3a; color: #999; }
.btn-dismiss:hover { background: #2a2a2a; }
.btn-fix { border-color: #3a3a1a; color: #ba7; }
.btn-fix:hover { background: #2a2a1a; }

/* ── Toast ──────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  animation: fadeIn 0.2s;
  max-width: 360px;
}
.toast-ok { background: #1a3a1a; color: #7b7; border: 1px solid #3a5a3a; }
.toast-err { background: #3a1a1a; color: #b77; border: 1px solid #5a3a3a; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

/* ── Events bar ─────────────────────────── */
.events-bar {
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.events-bar .events-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.event-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 12px;
  white-space: nowrap;
}
.event-chip.status-upcoming { background: #2a2a2a; color: #888; }
.event-chip.status-imminent { background: #3a3a1a; color: #dd9; border: 1px solid #554; }
.event-chip.status-active { background: #3a1a1a; color: #e88; border: 1px solid #644; }
.event-chip.status-past { background: #1a1a1a; color: #555; text-decoration: line-through; }
.event-all-clear {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 3px;
  background: #1a3a1a;
  color: #7b7;
  font-size: 12px;
}
.event-freeze-note {
  font-size: 11px;
  color: var(--orange);
  margin-left: 4px;
}
.btn-add-event {
  margin-left: auto;
  padding: 2px 8px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
}
.btn-add-event:hover { background: var(--bg-hover); color: var(--text); }

/* ── Event modal ───────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
  width: 420px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 14px;
  color: var(--text-bright);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input[type="text"],
.modal input[type="date"],
.modal input[type="time"],
.modal textarea {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
}
.modal textarea { resize: vertical; min-height: 40px; }
.modal .row { display: flex; gap: 12px; }
.modal .row > div { flex: 1; }
.modal .checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.modal .checkbox-group label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  text-transform: none;
  font-size: 12px;
  color: var(--text);
  margin: 0;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}

/* ── Charts ─────────────────────────────── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-top: 6px;
}
.chart-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
}
.chart-card h3 {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  font-weight: 500;
}
.chart-card canvas {
  max-height: 160px;
}

/* ── Project filter pills ──────────────── */
.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  margin-top: 6px;
}
.filter-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-dim);
  font-family: inherit;
  transition: all 0.15s;
}
.filter-pill:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.filter-pill.active {
  background: #1a3a4a;
  color: #7bc;
  border-color: #2a5a6a;
}

/* ── Sync status ───────────────────────── */
.sync-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 12px;
  align-items: center;
}
.sync-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.sync-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
}
.sync-dot.synced { background: var(--green); }
.sync-dot.unsynced { background: var(--orange); }
.sync-dot.dirty { background: var(--red); }
.sync-dot.unknown { background: var(--text-dim); }

/* ── Collapsible ────────────────────────── */
.collapsed .section-body { display: none; }

/* ── Empty state ────────────────────────── */
.empty { color: var(--text-dim); font-style: italic; padding: 8px 0; }

/* ── Responsive ─────────────────────────── */
@media (max-width: 768px) {
  /* 9/10. Prevent horizontal overflow */
  html, body { overflow-x: hidden; max-width: 100vw; }

  /* 5. Font — min 13px body, monospace headers can be 11px */
  body { font-size: 13px; }
  table { font-size: 13px; }
  th { font-size: 11px; }

  /* Section padding */
  .section { padding: 8px 12px; }
  .header { padding: 10px 12px; }
  .header h1 { font-size: 13px; }

  /* Hide columns on mobile */
  .hide-mobile { display: none; }

  /* 1. System stats — stack vertically (1 column) */
  .sys-bar {
    flex-direction: column;
    gap: 4px;
  }

  /* 2. Services/quick links — wrap to 2 per row */
  .svc-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }

  /* 3. Tables — horizontal scroll wrapper fallback */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -12px;
    padding: 0 12px;
  }
  td, th { padding: 6px 6px; }

  /* 4. Buttons — 44px tap target (Apple HIG) */
  .btn {
    min-height: 44px;
    min-width: 44px;
    padding: 8px 14px;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Events/toast — full width, text wraps */
  .toast-container {
    left: 12px;
    right: 12px;
    bottom: 12px;
  }
  .toast { max-width: none; }

  /* 7. Review queue — card layout on mobile */
  #review-body table,
  #review-body thead,
  #review-body tbody,
  #review-body th,
  #review-body tr,
  #review-body td {
    display: block;
  }
  #review-body thead { display: none; }
  #review-body table { border: none; }
  #review-body tr {
    margin-bottom: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
  }
  #review-body tr:hover td { background: transparent; }
  #review-body td {
    padding: 2px 0;
    border: none;
  }
  #review-body td.hide-mobile { display: none; }
  #review-body td::before {
    content: attr(data-label);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 8px;
  }
  #review-body td.review-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  #review-body td.review-actions::before { display: none; }
  #review-body td.review-actions .btn { flex: 1; }

  /* 8. Completed — task name + status badge only on mobile */
  .hide-mobile-completed { display: none; }

  /* Charts — single column on mobile */
  .charts-grid {
    grid-template-columns: 1fr;
  }
  .chart-card canvas {
    max-height: 200px;
  }

  /* Filter pills — scroll horizontally */
  .filter-pills {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .filter-pill {
    flex-shrink: 0;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }

  /* Sync bar — stack */
  .sync-bar {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Fleet Monitor</h1>
  <div class="header-right">
    <span id="updated">--</span>
    <span class="live-dot" id="live-dot"></span>
  </div>
</div>

<!-- System -->
<div class="section" id="sys-section">
  <div class="sys-bar" id="sys-bar">
    <span>CPU: <span class="val" id="sys-cpu">--</span></span>
    <span>RAM: <span class="val" id="sys-ram">--</span></span>
    <span>Disk: <span class="val" id="sys-disk">--</span></span>
    <span>Uptime: <span class="val" id="sys-uptime">--</span></span>
  </div>
</div>

<!-- Services -->
<div class="section" id="svc-section">
  <div class="svc-bar" id="svc-bar">--</div>
</div>

<!-- Events -->
<div class="events-bar" id="events-bar">
  <span class="events-label">Events</span>
  <span id="events-chips"></span>
  <button class="btn-add-event" onclick="openEventModal()">+ Event</button>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <h2>Add Event</h2>
    <label>Title</label>
    <input type="text" id="evt-title" placeholder="e.g. Supervisor Meeting">
    <div class="row">
      <div><label>Date</label><input type="date" id="evt-date"></div>
    </div>
    <div class="row">
      <div><label>Start time</label><input type="time" id="evt-start"></div>
      <div><label>End time</label><input type="time" id="evt-end"></div>
    </div>
    <label>Freeze projects</label>
    <div class="checkbox-group" id="evt-freeze-projects"></div>
    <div class="row">
      <div><label>Freeze from</label><input type="time" id="evt-freeze-from"></div>
      <div><label>Freeze until</label><input type="time" id="evt-freeze-until"></div>
    </div>
    <label>Notes</label>
    <textarea id="evt-notes" rows="2"></textarea>
    <div class="modal-actions">
      <button class="btn btn-dismiss" onclick="closeEventModal()">Cancel</button>
      <button class="btn btn-merge" onclick="submitEvent()">Save</button>
    </div>
  </div>
</div>

<!-- Charts -->
<div class="section" id="charts-section">
  <div class="section-header" onclick="toggleSection('charts-section')">
    <span class="section-label" style="margin-bottom:0">Progress</span>
    <span class="toggle" id="charts-toggle">[hide]</span>
  </div>
  <div class="section-body">
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Tasks / Day (7d)</h3>
        <canvas id="chart-daily"></canvas>
      </div>
      <div class="chart-card">
        <h3>Queue Depth (24h)</h3>
        <canvas id="chart-queue"></canvas>
      </div>
      <div class="chart-card">
        <h3>By Project</h3>
        <canvas id="chart-projects"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- my-world Sync Status -->
<div class="section" id="sync-section">
  <div class="section-label">my-world Sync</div>
  <div class="sync-bar" id="sync-bar">
    <span class="empty">Loading...</span>
  </div>
</div>

<!-- Active Tasks -->
<div class="section" id="active-section">
  <div class="section-label">Active Tasks</div>
  <div id="active-body"></div>
</div>

<!-- Completed (collapsible) -->
<div class="section" id="completed-section">
  <div class="section-header" onclick="toggleSection('completed-section')">
    <span class="section-label" style="margin-bottom:0">Completed <span id="completed-count"></span></span>
    <span class="toggle" id="completed-toggle">[hide]</span>
  </div>
  <div class="section-body" style="margin-top:6px">
    <div class="filter-pills" id="project-filters"></div>
    <div id="completed-body"></div>
  </div>
</div>

<!-- Review Queue -->
<div class="section" id="review-section" style="display:none">
  <div class="section-header" onclick="toggleSection('review-section')">
    <span class="section-label" style="margin-bottom:0">Review Queue <span id="review-count"></span></span>
    <span class="toggle" id="review-toggle">[hide]</span>
  </div>
  <div class="section-body" id="review-body" style="margin-top:6px"></div>
</div>

<!-- Backlog -->
<div class="section" id="backlog-section">
  <div class="section-header" onclick="toggleSection('backlog-section')">
    <span class="section-label" style="margin-bottom:0">Backlog <span id="backlog-count"></span></span>
    <span class="toggle" id="backlog-toggle">[hide]</span>
  </div>
  <div class="section-body" id="backlog-body" style="margin-top:6px"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const REFRESH = 10000;
let lastFetch = 0;
let activeProjectFilter = null;  // null = show all
let allTasks = [];  // cached for filtering

// ── Chart instances (reuse to avoid memory leaks) ────────
let chartDaily = null;
let chartQueue = null;
let chartProjects = null;

// Chart.js dark theme defaults
const chartDefaults = {
  color: '#888',
  borderColor: '#333',
  backgroundColor: 'transparent',
};

// ── Helpers ─────────────────────────────────

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function duration(start, end) {
  if (!start) return '--';
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  const sec = Math.floor((e - s) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function badge(status) {
  const cls = 'badge-' + (status || 'queued');
  return '<span class="badge ' + cls + '">' + esc(status || 'unknown') + '</span>';
}

function shortBranch(b) {
  if (!b) return '--';
  return b.length > 30 ? b.slice(0, 28) + '..' : b;
}

function shortSlug(id) {
  if (!id) return '--';
  const m = id.match(/^\d{8}-\d{6}-(.+)$/);
  return m ? m[1] : id;
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function toggleSection(id) {
  const sec = document.getElementById(id);
  sec.classList.toggle('collapsed');
  const toggle = sec.querySelector('.toggle');
  if (toggle) toggle.textContent = sec.classList.contains('collapsed') ? '[show]' : '[hide]';
}

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Actions ─────────────────────────────────

async function doMerge(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'merging...';
  try {
    const res = await apiPost('/api/action', { type: 'merge', task_slug: slug });
    if (res.status === 'ok') {
      toast('Merged: ' + (res.message || slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Merge failed: ' + (res.message || 'unknown error'), false);
      btn.disabled = false;
      btn.textContent = 'Merge';
    }
  } catch (e) {
    toast('Merge error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Merge';
  }
}

async function doDismiss(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dismissing...';
  try {
    const res = await apiPost('/api/action', { type: 'skip', task_slug: slug });
    if (res.status === 'ok') {
      toast('Dismissed: ' + shortSlug(slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Dismiss failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Dismiss';
    }
  } catch (e) {
    toast('Dismiss error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Dismiss';
  }
}

async function doAutofix(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'dispatching...';
  try {
    const res = await apiPost('/api/action', { type: 'fix', task_slug: slug });
    if (res.status === 'ok') {
      toast('Fix dispatched: ' + shortSlug(slug), true);
      const row = btn.closest('tr');
      if (row) row.remove();
      setTimeout(refresh, 1000);
    } else {
      toast('Fix failed: ' + (res.message || ''), false);
      btn.disabled = false;
      btn.textContent = 'Auto-fix';
    }
  } catch (e) {
    toast('Fix error: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Auto-fix';
  }
}

// ── Renderers ───────────────────────────────

function renderSystem(data) {
  document.getElementById('sys-cpu').textContent = data.cpu_percent + '%';
  document.getElementById('sys-ram').textContent = data.ram_used_gb + '/' + data.ram_total_gb + ' GB';
  document.getElementById('sys-disk').textContent = (data.disk_free_gb || '--') + ' GB free';
  document.getElementById('sys-uptime').textContent = data.uptime || '--';
}

function renderServices(svcs) {
  const bar = document.getElementById('svc-bar');
  bar.innerHTML = svcs.map(function(s) {
    const up = s.status === 'up';
    const label = s.port ? s.name + ':' + s.port : s.name;
    return '<span>' + esc(label) + ' <span class="svc-dot ' + (up ? 'up' : 'down') + '"></span></span>';
  }).join('');
}

function renderActiveTasks(tasks) {
  const active = tasks.filter(function(t) { return t.status === 'running' || t.status === 'queued'; });
  const el = document.getElementById('active-body');

  if (active.length === 0) {
    el.innerHTML = '<div class="empty">No active tasks</div>';
    return;
  }

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Branch</th></tr></thead><tbody>';
  for (let i = 0; i < active.length; i++) {
    const t = active[i];
    const cls = t.status === 'running' ? 'running' : 'queued';
    html += '<tr class="' + cls + '">';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + esc(shortBranch(t.branch)) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Project filter ──────────────────────────

function setProjectFilter(project) {
  activeProjectFilter = project;
  // Re-render pills active state
  document.querySelectorAll('.filter-pill').forEach(function(pill) {
    pill.classList.toggle('active', pill.dataset.project === (project || ''));
  });
  // Re-render completed with filter
  renderCompleted(allTasks);
}

function renderProjectFilters(tasks) {
  const cutoff = Date.now() - 24 * 3600 * 1000;
  const recent = tasks.filter(function(t) {
    if (t.status !== 'completed' && t.status !== 'merged' && t.status !== 'failed') return false;
    const fin = t.finished_at || t.merged_at;
    return fin && new Date(fin).getTime() > cutoff;
  });

  // Count per project
  const counts = {};
  for (let i = 0; i < recent.length; i++) {
    const p = recent[i].project_name || 'unknown';
    counts[p] = (counts[p] || 0) + 1;
  }

  const el = document.getElementById('project-filters');
  if (Object.keys(counts).length <= 1) {
    el.innerHTML = '';
    return;
  }

  let html = '<button class="filter-pill' + (activeProjectFilter === null ? ' active' : '') + '" data-project="" onclick="setProjectFilter(null)">All (' + recent.length + ')</button>';
  const sorted = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; });
  for (let i = 0; i < sorted.length; i++) {
    const name = sorted[i][0];
    const count = sorted[i][1];
    const isActive = activeProjectFilter === name;
    html += '<button class="filter-pill' + (isActive ? ' active' : '') + '" data-project="' + esc(name) + '" onclick="setProjectFilter(\'' + esc(name).replace(/'/g, "\\'") + '\')">' + esc(name) + ' (' + count + ')</button>';
  }
  el.innerHTML = html;
}

function renderCompleted(tasks) {
  const cutoff = Date.now() - 24 * 3600 * 1000;
  let recent = tasks.filter(function(t) {
    if (t.status !== 'completed' && t.status !== 'merged' && t.status !== 'failed') return false;
    const fin = t.finished_at || t.merged_at;
    if (!fin) return false;
    return new Date(fin).getTime() > cutoff;
  });

  // Apply project filter
  if (activeProjectFilter) {
    recent = recent.filter(function(t) { return t.project_name === activeProjectFilter; });
  }

  document.getElementById('completed-count').textContent = '(' + recent.length + ')';

  const el = document.getElementById('completed-body');
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty">No completed tasks' + (activeProjectFilter ? ' for ' + esc(activeProjectFilter) : ' in last 24h') + '</div>';
    return;
  }

  let html = '<table><thead><tr><th>Task</th><th class="hide-mobile-completed">Project</th><th>Status</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Finished</th></tr></thead><tbody>';
  for (let i = 0; i < recent.length; i++) {
    const t = recent[i];
    html += '<tr>';
    html += '<td>' + esc(shortSlug(t.id || t.slug)) + '</td>';
    html += '<td class="hide-mobile-completed">' + esc(t.project_name || '--') + '</td>';
    html += '<td>' + badge(t.status) + '</td>';
    html += '<td class="hide-mobile">' + duration(t.started_at, t.finished_at) + '</td>';
    html += '<td class="hide-mobile">' + timeAgo(t.finished_at || t.merged_at) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderReview(items) {
  const sec = document.getElementById('review-section');
  const el = document.getElementById('review-body');
  const countEl = document.getElementById('review-count');

  if (items.length === 0) {
    sec.style.display = 'none';
    if (countEl) countEl.textContent = '';
    return;
  }
  sec.style.display = '';
  if (countEl) countEl.textContent = '(' + items.length + ')';

  let html = '<table><thead><tr><th>Task</th><th>Project</th><th>Type</th><th class="hide-mobile">Reason</th><th>Action</th></tr></thead><tbody>';
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const meta = item.meta || {};
    const taskId = meta.task_id || '';
    const slug = shortSlug(taskId);
    const project = meta.project || '--';
    const itemType = meta.type || 'unknown';
    const reason = item.reason || '';
    const prStatus = item.pr_status || 'unknown';
    const safeId = taskId.replace(/'/g, "\\'");

    let actions = '';
    if (itemType === 'completed') {
      if (prStatus === 'merged') {
        actions += badge('merged') + ' ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      } else if (prStatus === 'closed') {
        actions += '<span class="badge" style="background:#2a2a2a;color:#888">closed</span> ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      } else {
        actions += '<button class="btn btn-merge" onclick="doMerge(\'' + safeId + '\', this)">Merge</button> ';
        actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
      }
    } else if (itemType === 'failed' || itemType === 'blocked') {
      actions += '<button class="btn btn-fix" onclick="doAutofix(\'' + safeId + '\', this)">Auto-fix</button> ';
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    } else {
      actions += '<button class="btn btn-dismiss" onclick="doDismiss(\'' + safeId + '\', this)">Dismiss</button>';
    }

    html += '<tr>';
    html += '<td data-label="Task">' + esc(slug) + '</td>';
    html += '<td data-label="Project">' + esc(project) + '</td>';
    html += '<td data-label="Type">' + badge(itemType) + '</td>';
    html += '<td class="hide-mobile" data-label="Reason">' + esc(reason) + '</td>';
    html += '<td class="review-actions">' + actions + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderBacklog(tasks) {
  document.getElementById('backlog-count').textContent = '(' + tasks.length + ')';

  const el = document.getElementById('backlog-body');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty">No backlog items</div>';
    return;
  }

  let html = '<table><thead><tr><th>Pri</th><th>Task</th><th>Project</th><th class="hide-mobile">Est.</th><th class="hide-mobile">Category</th></tr></thead><tbody>';
  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    html += '<tr>';
    html += '<td>' + (t.priority != null ? t.priority : '--') + '</td>';
    html += '<td>' + esc(t.slug || t.id || '--') + '</td>';
    html += '<td>' + esc(t.project_name || '--') + '</td>';
    html += '<td class="hide-mobile">' + (t.estimated_minutes ? t.estimated_minutes + 'm' : '--') + '</td>';
    html += '<td class="hide-mobile">' + esc(t.category || '--') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Events ───────────────────────────────────

function formatEventTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function renderEvents(events) {
  const el = document.getElementById('events-chips');
  // Filter out past events older than 1 hour
  const now = Date.now();
  const relevant = events.filter(function(e) {
    if (e.status === 'past') {
      const end = new Date(e.end).getTime();
      return (now - end) < 3600000; // show past events for 1 hour
    }
    return true;
  });

  if (relevant.length === 0) {
    el.innerHTML = '<span class="event-all-clear">All clear</span>';
    return;
  }

  let html = '';
  for (let i = 0; i < relevant.length; i++) {
    const e = relevant[i];
    const start = formatEventTime(e.start);
    const end = formatEventTime(e.end);
    let text = start + '–' + end + ' ' + esc(e.title);
    if (e.freeze_from && e.status !== 'past') {
      text += '<span class="event-freeze-note"> — Freeze from ' + formatEventTime(e.freeze_from) + '</span>';
    }
    html += '<span class="event-chip status-' + esc(e.status) + '">' + text + '</span> ';
  }
  el.innerHTML = html;
}

// ── Event modal ──────────────────────────────

let projectsList = [];

function openEventModal() {
  document.getElementById('event-modal').classList.add('open');
  // Pre-fill date with today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('evt-date').value = today;
  // Load projects for checkboxes
  loadProjectCheckboxes();
}

function closeEventModal() {
  document.getElementById('event-modal').classList.remove('open');
}

async function loadProjectCheckboxes() {
  const el = document.getElementById('evt-freeze-projects');
  if (projectsList.length > 0) {
    renderProjectCheckboxes(el);
    return;
  }
  try {
    projectsList = await api('/api/projects');
  } catch (e) {
    projectsList = [];
  }
  renderProjectCheckboxes(el);
}

function renderProjectCheckboxes(el) {
  if (projectsList.length === 0) {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:11px">No projects found</span>';
    return;
  }
  let html = '';
  for (let i = 0; i < projectsList.length; i++) {
    const name = esc(projectsList[i].name);
    html += '<label><input type="checkbox" value="' + name + '"> ' + name + '</label>';
  }
  el.innerHTML = html;
}

async function submitEvent() {
  const title = document.getElementById('evt-title').value.trim();
  const date = document.getElementById('evt-date').value;
  const startTime = document.getElementById('evt-start').value;
  const endTime = document.getElementById('evt-end').value;

  if (!title || !date || !startTime || !endTime) {
    toast('Fill in title, date, start, and end time', false);
    return;
  }

  const start = date + 'T' + startTime + ':00Z';
  const end = date + 'T' + endTime + ':00Z';

  const freezeFrom = document.getElementById('evt-freeze-from').value;
  const freezeUntil = document.getElementById('evt-freeze-until').value;
  const notes = document.getElementById('evt-notes').value.trim();

  // Collect checked projects
  const checks = document.querySelectorAll('#evt-freeze-projects input:checked');
  const freezeProjects = [];
  for (let i = 0; i < checks.length; i++) {
    freezeProjects.push(checks[i].value);
  }

  const body = {
    title: title,
    start: start,
    end: end,
    freeze_projects: freezeProjects,
    freeze_from: freezeFrom ? date + 'T' + freezeFrom + ':00Z' : '',
    freeze_until: freezeUntil ? date + 'T' + freezeUntil + ':00Z' : '',
    notes: notes,
  };

  try {
    const res = await apiPost('/api/events', body);
    if (res.status === 'ok') {
      toast('Event added: ' + title, true);
      closeEventModal();
      // Clear form
      document.getElementById('evt-title').value = '';
      document.getElementById('evt-start').value = '';
      document.getElementById('evt-end').value = '';
      document.getElementById('evt-freeze-from').value = '';
      document.getElementById('evt-freeze-until').value = '';
      document.getElementById('evt-notes').value = '';
      refresh();
    } else {
      toast('Failed: ' + (res.message || ''), false);
    }
  } catch (e) {
    toast('Error: ' + e.message, false);
  }
}

// ── Charts ──────────────────────────────────

const CHART_COLORS = {
  blue: '#68a',
  green: '#5a5',
  red: '#a55',
  yellow: '#aa6',
  orange: '#a85',
  purple: '#86a',
  cyan: '#5aa',
  pink: '#a68',
};
const PROJECT_COLORS = ['#68a', '#5a5', '#a85', '#86a', '#a55', '#5aa', '#aa6', '#a68'];

function renderDailyChart(data) {
  const ctx = document.getElementById('chart-daily');
  if (!ctx) return;

  // Fill in missing days
  const labels = [];
  const completed = [];
  const merged = [];
  const failed = [];
  const now = new Date();
  const dataMap = {};
  for (let i = 0; i < data.length; i++) {
    dataMap[data[i].day] = data[i];
  }
  for (let d = 6; d >= 0; d--) {
    const date = new Date(now);
    date.setDate(date.getDate() - d);
    const key = date.toISOString().slice(0, 10);
    const dayLabel = date.toLocaleDateString([], { weekday: 'short' });
    labels.push(dayLabel);
    const entry = dataMap[key] || {};
    completed.push(entry.completed || 0);
    merged.push(entry.merged || 0);
    failed.push(entry.failed || 0);
  }

  if (chartDaily) chartDaily.destroy();
  chartDaily = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'Completed', data: completed, backgroundColor: '#3a5a3a', borderColor: '#5a5', borderWidth: 1 },
        { label: 'Merged', data: merged, backgroundColor: '#1a3a4a', borderColor: '#68a', borderWidth: 1 },
        { label: 'Failed', data: failed, backgroundColor: '#3a1a1a', borderColor: '#a55', borderWidth: 1 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#888', boxWidth: 12, font: { size: 10 } } } },
      scales: {
        x: { stacked: true, ticks: { color: '#888', font: { size: 10 } }, grid: { color: '#2a2a2a' } },
        y: { stacked: true, beginAtZero: true, ticks: { color: '#888', font: { size: 10 }, stepSize: 1 }, grid: { color: '#2a2a2a' } },
      },
    },
  });
}

function renderQueueChart(data) {
  const ctx = document.getElementById('chart-queue');
  if (!ctx) return;

  // Sample every 2 hours for cleaner display
  const labels = [];
  const queued = [];
  const running = [];
  for (let i = 0; i < data.length; i += 2) {
    labels.push(data[i].hour);
    queued.push(data[i].queued);
    running.push(data[i].running);
  }

  if (chartQueue) chartQueue.destroy();
  chartQueue = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Queued', data: queued, borderColor: '#aa6', backgroundColor: 'rgba(170,170,100,0.1)', fill: true, tension: 0.3, pointRadius: 0 },
        { label: 'Running', data: running, borderColor: '#68a', backgroundColor: 'rgba(100,136,170,0.1)', fill: true, tension: 0.3, pointRadius: 0 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#888', boxWidth: 12, font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#888', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2a2a' } },
        y: { beginAtZero: true, ticks: { color: '#888', font: { size: 10 }, stepSize: 1 }, grid: { color: '#2a2a2a' } },
      },
    },
  });
}

function renderProjectsChart(data) {
  const ctx = document.getElementById('chart-projects');
  if (!ctx || data.length === 0) return;

  const labels = data.map(function(d) { return d.project_name; });
  const counts = data.map(function(d) { return d.count; });
  const colors = labels.map(function(_, i) { return PROJECT_COLORS[i % PROJECT_COLORS.length]; });
  const bgColors = colors.map(function(c) { return c + '99'; }); // add alpha

  if (chartProjects) chartProjects.destroy();
  chartProjects = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: counts,
        backgroundColor: bgColors,
        borderColor: colors,
        borderWidth: 1,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#888', boxWidth: 10, font: { size: 10 }, padding: 6 },
        },
      },
    },
  });
}

async function refreshCharts() {
  try {
    const [daily, queue, projects] = await Promise.all([
      api('/api/stats/daily?days=7'),
      api('/api/stats/queue-depth?hours=24'),
      api('/api/stats/projects'),
    ]);
    renderDailyChart(daily);
    renderQueueChart(queue);
    renderProjectsChart(projects);
  } catch (e) {
    console.error('Charts failed:', e);
  }
}

// ── Sync status ─────────────────────────────

async function refreshSyncStatus() {
  const el = document.getElementById('sync-bar');
  try {
    const data = await api('/api/git-status/my-world');
    if (data.error) {
      el.innerHTML = '<span class="empty">' + esc(data.error) + '</span>';
      return;
    }

    let html = '';

    // Branch
    if (data.branch) {
      html += '<span class="sync-item">' + esc(data.branch) + '</span>';
    }

    // Last commit
    if (data.last_commit) {
      const c = data.last_commit;
      html += '<span class="sync-item">Last: <span class="val">' + esc(c.hash) + '</span> ' + esc(c.message.substring(0, 40)) + '</span>';
    }

    // Sync state
    if (data.has_changes) {
      html += '<span class="sync-item"><span class="sync-dot dirty"></span> ' + data.uncommitted_count + ' uncommitted</span>';
    } else if (data.synced === true) {
      html += '<span class="sync-item"><span class="sync-dot synced"></span> Synced</span>';
    } else if (data.synced === false) {
      let syncText = 'Not synced';
      if (data.ahead) syncText += ' (' + data.ahead + ' ahead';
      if (data.behind) syncText += (data.ahead ? ', ' : '(') + data.behind + ' behind';
      if (data.ahead || data.behind) syncText += ')';
      html += '<span class="sync-item"><span class="sync-dot unsynced"></span> ' + syncText + '</span>';
    } else {
      html += '<span class="sync-item"><span class="sync-dot unknown"></span> No upstream</span>';
    }

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<span class="empty">Sync check failed</span>';
  }
}

function updateTimestamp() {
  const ago = Math.floor((Date.now() - lastFetch) / 1000);
  document.getElementById('updated').textContent = ago + 's ago';
}

// ── Main refresh ────────────────────────────

async function refresh() {
  try {
    const [sys, svcs, tasks, review, backlog, events] = await Promise.all([
      api('/api/system'),
      api('/api/services'),
      api('/api/tasks'),
      api('/api/review'),
      api('/api/backlog'),
      api('/api/events'),
    ]);

    lastFetch = Date.now();
    allTasks = tasks;
    document.getElementById('live-dot').className = 'live-dot';

    renderSystem(sys);
    renderServices(svcs);
    renderEvents(events);
    renderActiveTasks(tasks);
    renderProjectFilters(tasks);
    renderCompleted(tasks);
    renderReview(review);
    renderBacklog(backlog);
  } catch (e) {
    document.getElementById('live-dot').className = 'live-dot dead';
    console.error('Refresh failed:', e);
  }
}

// ── Init ────────────────────────────────────

refresh();
refreshCharts();
refreshSyncStatus();
setInterval(refresh, REFRESH);
setInterval(refreshCharts, 60000);  // charts every 60s (data doesn't change fast)
setInterval(refreshSyncStatus, 30000);  // sync status every 30s
setInterval(updateTimestamp, 1000);
</script>
